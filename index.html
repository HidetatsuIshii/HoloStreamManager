<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ホロストリーマー</title>
    <style>
        :root {
            --bg-dark: #050505;
            --panel-bg: rgba(20, 20, 20, 0.98);
            --accent: #00d4ff;
            --text: #e0e0e0;
            --member-green: #2ba640;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: var(--bg-dark); color: var(--text);
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* スパチャ用背景（半透明） */
        .is-supa {
            background: rgba(255, 215, 0, 0.3); /* ゴールド系の半透明 */
            border-radius: 4px;
            padding: 2px 8px;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }
        
        /* メンバーシップ用の色（!importantで確実に適用） */
        .is-member {
            color: #2ba640 !important; /* 直接指定 */
            text-shadow: 1px 1px 1px #000, -1px -1px 1px #000 !important;
        }

        /* ハンバーガーボタンのスタイル */
        #menu-trigger {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 40px;
            height: 40px;
            background: var(--panel-bg);
            border: 1px solid #444;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10001; 
            transition: opacity 0.2s ease, visibility 0.2s; /* アニメーションを不透明度に変更 */
        }
        
        #menu-trigger:hover {
            background: #333;
        }
        
        .bar {
            width: 20px;
            height: 2px;
            background: var(--accent);
            margin: 2px 0;
        }

        /* サイドバーが active または empty (初期) のときはボタンを消す */
        #sidebar.active ~ #menu-trigger,
        #sidebar.empty ~ #menu-trigger {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        /* サイドバーの初期状態（画面外へ） */
        #sidebar {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 280px; 
            height: 100%;
            background: var(--panel-bg); 
            border-right: 1px solid #444;
            z-index: 10000; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* 動きを滑らかに */
            transform: translateX(-100%); /* 完全に隠す */
        }
        /* 表示状態 */
        #sidebar.active { 
            transform: translateX(0); 
        }
        
        /* 初回起動時（URL入力前）もサイドバーを出しておくならここ */
        #sidebar.empty { 
            transform: translateX(0); 
        }

        #url-list {
            width: 100%;
            /* 1. 自動で潰されないように最小の高さを固定（1行分以上を確保） */
            min-height: 120px; 
            
            /* 2. 手動でのリサイズ機能（縦方向のみ）を維持 */
            resize: vertical; 
            
            /* 3. 他の要素に押し負けないように設定 */
            flex-shrink: 0; 
        
            /* スタイル調整（既存のものがあれば適宜合わせてください） */
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: 1px solid var(--accent);
            padding: 8px;
            font-size: 12px;
            box-sizing: border-box;
        }
        
        /* --- サイドバーの中身をスクロール可能に修正 --- */
        .sidebar-content { 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; /* 画面いっぱいの高さに固定 */
            box-sizing: border-box; 
            overflow-y: auto; /* 縦スクロールを有効化 */
        }
        /* スクロールバーのデザイン（任意：暗い背景に合わせる） */
        .sidebar-content::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar-content::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
        
        textarea {
            width: 100%; height: 100px; background: #111; color: #0f0;
            border: 1px solid #333; border-radius: 4px; padding: 10px;
            box-sizing: border-box; font-family: monospace; font-size: 11px;
        }
        .stream-item button:hover {
            background: #ff4444; /* ホバーで赤く */
        }

        /* ビデオウィンドウ */
        #canvas { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        .video-window {
            position: absolute; width: 480px; height: 270px;
            background: #000; border: 2px solid #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
            overflow: hidden; min-width: 200px; min-height: 120px;
            transition: width 0.15s, height 0.15s, left 0.15s, top 0.15s, border-color 0.2s;
            max-width: 100vw; max-height: 100vh;
        }
        .video-window.moving { transition: none; } /* 移動・リサイズ中はアニメオフ */

        .video-content { flex: 1; position: relative; width: 100%; height: 100%; }
        iframe.main-video { width: 100%; height: 100%; border: none; pointer-events: none; }
        .video-window.interacting iframe.main-video { pointer-events: auto; }
        
        /* 操作用透明レイヤー */
        .drag-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; cursor: move; background: transparent;
        }
        .video-window.interacting .drag-overlay { pointer-events: none; }

        /* 操作モード中は、マウスを載せてもパネルを出さない */
        .video-window.interacting .individual-config {
            display: none !important;
        }

        /* リサイズ・ドラッグ中の全画面ガード */
        #global-guard {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9000; display: none; background: transparent;
        }

        /* サイドバーの配信中カード */
        /* 配信中リストのカードデザイン */
        .live-card {
            display: flex;
            gap: 10px;
            background: rgba(40, 40, 40, 0.5);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            align-items: center;
        }
        
        .live-card:hover {
            background: rgba(60, 60, 60, 0.8);
            border-color: var(--accent);
            transform: translateX(5px);
        }
        
        .live-thumb {
            width: 100px;
            height: 56px;
            object-fit: cover;
            border-radius: 4px;
            flex-shrink: 0;
        }
        
        .live-card-info {
            flex: 1;
            overflow: hidden;
        }
        
        .live-card-channel {
            font-size: 11px;
            color: var(--accent);
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .live-card-title {
            font-size: 10px;
            color: #ccc;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        

        /* 総合コントロールパネル */
        .individual-config {
            position: absolute;
            top: 25px;    /* 少し余白を調整 */
            right: 25px;  /* leftからrightへ変更 */
            background: rgba(0,0,0,0.95);
            padding: 10px;
            border-radius: 6px;
            display: none;
            z-index: 5000;
            font-size: 10px;
            width: 140px; /* ボタン追加分、少し幅を広げると安定します */
            border: 1px solid #555;
            transform: scale(0.85);
            transform-origin: top right; /* 拡大の起点を右上に変更 */
            pointer-events: auto;
        }
        /* 閉じるボタン（×）のスタイル */
        .close-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            line-height: 18px;
            text-align: center;
            background: #444;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .close-btn:hover {
            background: #ff4444; /* ホバーで赤く光る */
        }
        .video-window:hover .individual-config { display: block; }
        .config-row { margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
        
        .comment-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; overflow: hidden; }
        .comment-text { position: absolute; white-space: nowrap; font-weight: 900; color: white; text-shadow: 2px 2px 2px #000; will-change: transform; }
        .comment-text img { height: 1.2em; vertical-align: middle; } /* 絵文字サイズ調整 */

        button { cursor: pointer; border: none; font-weight: bold; border-radius: 3px; background: #444; color: #fff; padding: 2px 6px; }
        .apply-btn { width: 100%; padding: 10px; background: var(--accent); color: #000; margin-top: 10px; }
        
        .quality-btn {
            background: #333;
            color: #888;
            font-size: 9px;
            padding: 2px 5px;
            border: 1px solid #444;
            min-width: 35px; /* テキスト長が変わってもガタつかないように固定 */
            transition: all 0.2s;
        }
        
        /* ON状態：水色に光る */
        .quality-btn.active {
            background: #444;
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 5px rgba(0, 212, 255, 0.3);
        }
        
        button.quality-btn:hover {
            background: #777;
        }

        .snap-preview {
            position: fixed;
            background: rgba(0, 212, 255, 0.2); /* アクセントカラーの薄い色 */
            border: 2px dashed var(--accent);
            pointer-events: none;
            z-index: 8500; /* ガードより手前、ウィンドウより奥 */
            display: none;
            transition: all 0.15s ease;
        }
    </style>
</head>
<body>

<div id="global-guard"></div>
<div id="snap-preview" class="snap-preview"></div>
    
<div id="sidebar" class="empty">
    <div class="sidebar-content">
        <div id="live-now-container" style="margin-top: 20px;">
            <p style="font-size: 10px; color: var(--accent); letter-spacing: 1px; margin-bottom: 8px; border-left: 2px solid var(--accent); padding-left: 8px;">ホロライブ配信中</p>
            <div id="hololive-live-list"></div>
        </div>
        <textarea id="url-list" placeholder="URLを改行して入力..."></textarea>
        <button class="apply-btn" onclick="applyStreams()">キャンバスに展開</button>
    </div>
</div>

<div id="menu-trigger" onclick="toggleSidebar()">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
</div>

<div id="canvas" onclick="handleCanvasClick(event)"></div>

<script>
    console.log("System Initializing..."); // これがコンソールに出るか確認
    let windowZIndex = 100;
    const guard = document.getElementById('global-guard');

    function handleCanvasClick(e) {
        const sidebar = document.getElementById('sidebar');
        const canvas = document.getElementById('canvas');
        
        // 1. サイドバーが表示されている場合（これは現状維持でOK）
        if (sidebar && sidebar.classList.contains('active')) {
            if (e.target.id === 'canvas') {
                sidebar.classList.remove('active');
                return; 
            }
        }
    
        // 2. 操作モード中、または「今モードを解除した直後」なら全画面をブロック
        const isAnyInteracting = document.querySelector('.video-window.interacting') !== null;
        const wasJustDeactivated = canvas.dataset.justDeactivated === "true";

        if (isAnyInteracting || wasJustDeactivated) {
            console.log("[Holo-Relay] 操作モードまたは解除直後のため、全画面切り替えを抑制しました");
            return; 
        }
    
        // 3. 通常のキャンバスクリック（サイドバーも閉じ、操作モードでもない時）
        if (e.target.id === 'canvas') {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log("Fullscreen Error:", err);
                });
            } else {
                document.exitFullscreen();
            }
        }
    }

    function sendCommand(id, cmd, arg) {
        const frame = document.querySelector(`[data-video-id="${id}"] iframe.main-video`);
        if (frame) frame.contentWindow.postMessage(JSON.stringify({ event: 'command', func: cmd, args: arg || [] }), '*');
    }
    
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('active');
        // emptyクラスが付いていると消えない場合があるので、手動操作時は除去する
        if (sidebar.classList.contains('active')) {
            sidebar.classList.remove('empty');
        }
    }
    
    function applyStreams() {
        const sidebar = document.getElementById('sidebar');
        const urlInput = document.getElementById('url-list').value;
        
        const ids = urlInput.split(/\s+/).map(url => {
            const m = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
            return m ? m[1] : null;
        }).filter(id => id);
    
        if (ids.length > 0) {
            if (sidebar) sidebar.classList.remove('empty');
            
            // --- 修正点：拡張機能へのリクエスト形式を統一 ---
            // 1. ライブ配信用のポーリング開始
            window.postMessage({ 
                type: "START_POLLING_REQUEST", 
                videoIds: ids 
            }, "*");
    
            // 2. アーカイブ配信の可能性があるため、シャドウタブ作成もリクエスト
            ids.forEach(id => {
                window.postMessage({ 
                    type: "OPEN_SHADOW_TAB_REQUEST", 
                    videoId: id 
                }, "*");
            });
            
            console.log("Commands sent to extension for:", ids);
        }
    
        ids.forEach((id, index) => {
            if (document.querySelector(`[data-video-id="${id}"]`)) return;
            createVideoWindow(id, index);
        });
        updateStreamList();
    }

    function togglePlay(id) {
        const win = document.querySelector(`[data-video-id="${id}"]`);
        const btn = win.querySelector('.play-pause-btn');
        if (btn.innerText === '▶') {
            sendCommand(id, 'playVideo');
            btn.innerText = 'Ⅱ';
        } else {
            sendCommand(id, 'pauseVideo');
            btn.innerText = '▶';
        }
    }

    function toggleHighQuality(id) {
        const btn = document.getElementById(`hq-btn-${id}`);
        if (!btn) return;
    
        const isCurrentlyAuto = !btn.classList.contains('active');
    
        if (isCurrentlyAuto) {
            // --- High設定へ切り替え ---
            sendCommand(id, 'setPlaybackQuality', ['highres']);
            btn.classList.add('active');
            btn.innerText = 'HQ'; // 表示テキスト
            btn.title = "最高画質: ON (クリックでAutoへ)";
        } else {
            // --- Auto設定へ切り替え ---
            sendCommand(id, 'setPlaybackQuality', ['default']);
            btn.classList.remove('active');
            btn.innerText = 'Auto'; // 表示をAutoに変えるとわかりやすいです
            btn.title = "最高画質: OFF (クリックでHighへ)";
        }
    }

    function createVideoWindow(id, index) {
        const win = document.createElement('div');
        win.className = 'video-window';
        win.dataset.videoId = id.trim();
        
        // 初期配置の計算
        win.style.left = (120 + (index % 3) * 60) + 'px';
        win.style.top = (120 + Math.floor(index / 3) * 60) + 'px';
        
        // zIndexの管理（未定義の場合は1から開始）
        if (typeof windowZIndex === 'undefined') window = 100; 
        win.style.zIndex = windowZIndex++;
    
        win.innerHTML = `
            <div class="individual-config">
                <div class="close-btn" onclick="removeStream('${id}')" title="配信を閉じる">×</div>
                
                <div class="config-row" style="margin-top: 15px;"> 
                    <div style="display:flex; gap:5px; margin-bottom:5px;">
                        <button class="play-pause-btn" onclick="togglePlay('${id}')">Ⅱ</button>
                        <button id="hq-btn-${id}" class="quality-btn active" onclick="toggleHighQuality('${id}')" title="最高画質: ON">HQ</button>
                    </div>
                    音量 <input type="range" min="0" max="100" value="50" oninput="sendCommand('${id}', 'setVolume', [this.value])" style="width:70px">
                </div>
                <div class="config-row">
                    <label><input type="checkbox" class="cfg-show" checked> 表示</label><br>
                    サイズ <input type="range" class="cfg-size" min="10" max="60" value="24" style="width:100%"><br>
                    速度 <input type="range" class="cfg-speed" min="1" max="20" value="10" style="width:100%">
                </div>
            </div>
            <div class="video-content">
                <div class="drag-overlay"></div>
                <iframe class="main-video" 
                    src="https://www.youtube.com/embed/${id}?autoplay=1&enablejsapi=1&rel=0&mute=1" 
                    allow="autoplay; encrypted-media;">
                </iframe>
                <div class="comment-canvas"></div>
            </div>
        `;
    
        // 外部依存変数のチェック（guard要素がない場合のフォールバック）
        const dragGuard = document.getElementById('guard') || { style: {} };
        const preview = document.getElementById('snap-preview') || { style: {} };
    
        let isResizing = false;
        let currentHandle = '';
    
        // --- リサイズ判定 ---
        win.onmousemove = (e) => {
            if (e.target.closest('.individual-config')) {
                win.style.cursor = 'default';
                return;
            }
            
            if (win.classList.contains('interacting') || isResizing) return;
            
            const rect = win.getBoundingClientRect();
            const hit = 25; 
            let cursor = '';
            
            const isTop = (e.clientY - rect.top < hit);
            const isBottom = (rect.bottom - e.clientY < hit);
            const isLeft = (e.clientX - rect.left < hit);
            const isRight = (rect.right - e.clientX < hit);
            
            if (isTop) cursor += 'n';
            else if (isBottom) cursor += 's';
            
            if (isLeft) cursor += 'w';
            else if (isRight) cursor += 'e';
            
            if (cursor) {
                win.style.cursor = cursor + '-resize';
                currentHandle = cursor;
            } else {
                win.style.cursor = 'default';
                currentHandle = '';
            }
        };
    
        // --- リサイズ実行 ---
        win.onmousedown = (e) => {
            if (win.style.cursor.includes('resize')) {
                isResizing = true;
                dragGuard.style.display = 'block';
                dragGuard.style.cursor = win.style.cursor;
                win.classList.add('moving');
    
                const startW = win.offsetWidth;
                const startH = win.offsetHeight;
                const startX = e.clientX;
                const startY = e.clientY;
                const startL = win.offsetLeft;
                const startT = win.offsetTop;
    
                const onMove = (ev) => {
                    if (currentHandle.includes('e')) win.style.width = Math.max(200, startW + (ev.clientX - startX)) + 'px';
                    if (currentHandle.includes('s')) win.style.height = Math.max(120, startH + (ev.clientY - startY)) + 'px';
                    if (currentHandle.includes('w')) {
                        const newW = Math.max(200, startW - (ev.clientX - startX));
                        win.style.left = (startL + startW - newW) + 'px';
                        win.style.width = newW + 'px';
                    }
                    if (currentHandle.includes('n')) {
                        const newH = Math.max(120, startH - (ev.clientY - startY));
                        win.style.top = (startT + startH - newH) + 'px';
                        win.style.height = newH + 'px';
                    }
                };
    
                const onUp = () => {
                    isResizing = false;
                    dragGuard.style.display = 'none';
                    win.classList.remove('moving');
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
                e.preventDefault();
            }
        };
    
        // --- ドラッグ & スナップ ---
        const overlay = win.querySelector('.drag-overlay');
        overlay.onmousedown = (e) => {
            if (win.style.cursor.includes('resize') || e.target.closest('.individual-config')) return;
            if (isResizing || win.classList.contains('interacting')) return;
            
            win.classList.add('moving');
            win.style.zIndex = windowZIndex++;
            dragGuard.style.display = 'block';
            dragGuard.style.cursor = 'move';
    
            let shiftX = e.clientX - win.getBoundingClientRect().left;
            let shiftY = e.clientY - win.getBoundingClientRect().top;
    
            const onMove = (ev) => {
                win.style.left = ev.pageX - shiftX + 'px';
                win.style.top = ev.pageY - shiftY + 'px';
            
                const snapRange = 100;
                const sw = window.innerWidth;
                const sh = window.innerHeight;
                const x = ev.clientX;
                const y = ev.clientY;
            
                let preRect = null;
                if (x < snapRange && y < snapRange) preRect = {l:0, t:0, w:sw/2, h:sh/2};
                else if (x > sw - snapRange && y < snapRange) preRect = {l:sw/2, t:0, w:sw/2, h:sh/2};
                else if (x < snapRange && y > sh - snapRange) preRect = {l:0, t:sh/2, w:sw/2, h:sh/2};
                else if (x > sw - snapRange && y > sh - snapRange) preRect = {l:sw/2, t:sh/2, w:sw/2, h:sh/2};
                else if (x < snapRange) preRect = {l:0, t:0, w:sw/2, h:sh};
                else if (x > sw - snapRange) preRect = {l:sw/2, t:0, w:sw/2, h:sh};
                else if (y < snapRange) preRect = {l:0, t:0, w:sw, h:sh/2};
                else if (y > sh - snapRange) preRect = {l:0, t:sh/2, w:sw, h:sh/2};
            
                if (preRect && preview.style) {
                    preview.style.display = 'block';
                    preview.style.left = preRect.l + 'px';
                    preview.style.top = preRect.t + 'px';
                    preview.style.width = preRect.w + 'px';
                    preview.style.height = preRect.h + 'px';
                } else if (preview.style) {
                    preview.style.display = 'none';
                }
            };
    
            const onUp = (ev) => {
                if (preview.style) preview.style.display = 'none';
                win.classList.remove('moving');
                dragGuard.style.display = 'none';
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
    
                const snapRange = 100;
                const sw = window.innerWidth;
                const sh = window.innerHeight;
                const x = ev.clientX;
                const y = ev.clientY;
    
                const snap = (l, t, w, h) => {
                    win.style.left = l + 'px'; win.style.top = t + 'px';
                    win.style.width = w + 'px'; win.style.height = h + 'px';
                };
    
                if (x < snapRange && y < snapRange) snap(0, 0, sw/2, sh/2);
                else if (x > sw - snapRange && y < snapRange) snap(sw/2, 0, sw/2, sh/2);
                else if (x < snapRange && y > sh - snapRange) snap(0, sh/2, sw/2, sh/2);
                else if (x > sw - snapRange && y > sh - snapRange) snap(sw/2, sh/2, sw/2, sh/2);
                else if (x < snapRange) snap(0, 0, sw/2, sh);
                else if (x > sw - snapRange) snap(sw/2, 0, sw/2, sh);
                else if (y < snapRange) snap(0, 0, sw, sh/2);
                else if (y > sh - snapRange) snap(0, sh/2, sw, sh/2);
            };
    
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        };
    
        // --- 各種イベント設定 ---
        
        // ダブルクリック：操作モード
        overlay.ondblclick = () => {
            win.classList.add('interacting');
            
            // このウィンドウ内にあるコントロールパネルを探して非表示にする
            const mainPanel = win.querySelector('.individual-config');
            if (mainPanel) {
                mainPanel.style.setProperty('display', 'none', 'important');
            }
            
            // 視覚的に切り替わったことを示す
            win.style.outline = "3px solid #ff0055";
        };
        
        // モード解除
        // モード解除（createVideoWindow 関数内）
        window.addEventListener('mousedown', (e) => {
            if (win.classList.contains('interacting')) {
                if (!win.contains(e.target)) {
                    // 【重要】解除する瞬間に一時的なフラグを canvas に付与する
                    const canvasEl = document.getElementById('canvas');
                    canvasEl.dataset.justDeactivated = "true";
                    
                    // 0.3秒後にフラグを消す（クリックイベント完了を待つ）
                    setTimeout(() => {
                        delete canvasEl.dataset.justDeactivated;
                    }, 300);

                    win.classList.remove('interacting');
                    win.style.outline = "none";
                    
                    const mainPanel = win.querySelector('.individual-config');
                    if (mainPanel) {
                        mainPanel.style.display = ''; 
                    }
                }
            }
        }, true); // Captureフェーズで実行
    
        // 右クリック：最前面へ（ブラウザメニュー禁止）
        win.oncontextmenu = (e) => {
            e.preventDefault(); 
            win.style.zIndex = windowZIndex++;
        };
        
        // iframeの読み込み完了時（画質自動設定）
        const iframe = win.querySelector('iframe');
        iframe.onload = () => {
            setTimeout(() => {
                const hqBtn = win.querySelector('.quality-btn');
                if (hqBtn && hqBtn.classList.contains('active')) {
                    if (typeof sendCommand === 'function') {
                        sendCommand(id, 'setPlaybackQuality', ['highres']);
                    }
                }
            }, 2000); 
        };
    
        document.getElementById('canvas').appendChild(win);
    }

    // 個別に動画を追加する関数（カードクリック時に呼ばれる）
    function addStream(id) {
        if (document.querySelector(`[data-video-id="${id}"]`)) return;
        
        // サイドバーの「empty」状態を解除
        const sidebar = document.getElementById('sidebar');
        if (sidebar) sidebar.classList.remove('empty');
    
        // 既存の作成関数を流用（indexは現在のウィンドウ数にする）
        const currentIndex = document.querySelectorAll('.video-window').length;
        createVideoWindow(id, currentIndex);
        updateStreamList();
    
        // 拡張機能へポーリング開始を通知
        window.postMessage({ 
            type: "START_POLLING_REQUEST", 
            videoIds: [id] 
        }, "*");
    }
    
    // Holodex APIから配信中データを取得して表示
    async function updateHoloLiveStatus() {
        const listContainer = document.getElementById('hololive-live-list');
        const API_KEY = '65f92c6d-c919-4861-a3a6-735a7290ec4a'; 
        const url = 'https://holodex.net/api/v2/live?org=Hololive&status=live&type=stream';
    
        try {
            const response = await fetch(url, {
                method: 'GET',
                headers: { 'X-APIKEY': API_KEY, 'Content-Type': 'application/json' }
            });
    
            const rawData = await response.json();
            listContainer.innerHTML = '';
    
            // フィルタリング（Hololiveのみ、かつホロスターズ除外）
            const data = rawData.filter(v => {
                if (!v.channel || v.channel.org !== "Hololive") return false;
                const suborg = v.channel.suborg ? v.channel.suborg.toUpperCase() : "";
                return !suborg.includes("HOLOSTARS");
            });
    
            if (data.length === 0) {
                listContainer.innerHTML = '<p style="font-size: 10px; color: #666; text-align: center; padding: 10px;">現在配信中の公式メンバーはいません</p>';
                return;
            }
    
            // 重複排除
            const uniqueData = Array.from(new Map(data.map(item => [item.channel.id, item])).values());
    
            uniqueData.forEach(video => {
                const card = document.createElement('div');
                card.className = 'live-card';
                
                const channelName = video.channel.name.replace(/Ch\.|- /gi, '').trim();
                // サムネイルURL（YouTubeの標準形式）
                const thumbUrl = `https://img.youtube.com/vi/${video.id}/mqdefault.jpg`;
    
                card.innerHTML = `
                    <img src="${thumbUrl}" class="live-thumb" alt="thumbnail">
                    <div class="live-card-info">
                        <div class="live-card-channel">${channelName}</div>
                        <div class="live-card-title">${video.title}</div>
                    </div>
                `;
                
                // クリックイベント
                card.onclick = () => addStream(video.id);
                
                listContainer.appendChild(card);
            });
    
        } catch (error) {
            console.error('API Error:', error);
            listContainer.innerHTML = '<p style="color:red; font-size:10px;">API取得エラー</p>';
        }
    }
    
    // ページ読み込み時に実行
    updateHoloLiveStatus();
    // 2分ごとにリストを自動更新
    setInterval(updateHoloLiveStatus, 120000);

    function updateStreamList() {
        // コンテナの存在チェックをより柔軟にする
        const list = document.getElementById('stream-list');
        if (!list) return; // stream-list 自体がない場合は何もしない
    
        list.innerHTML = '';
        const windows = document.querySelectorAll('.video-window');
        
        windows.forEach(win => {
            const id = win.dataset.videoId;
            const item = document.createElement('div');
            item.className = 'stream-item';
            item.style.padding = '10px';
            item.innerHTML = `
                <span style="color:var(--accent)">ID: ${id.substring(0,8)}</span>
                <button onclick="removeStream('${id}')" style="padding: 2px 8px; cursor:pointer;">削除</button>
            `;
            list.appendChild(item);
        });
    
        // サイドバーの empty クラス制御
        const sidebar = document.getElementById('sidebar');
        if (sidebar) {
            if (windows.length === 0) {
                sidebar.classList.add('empty');
            } else {
                sidebar.classList.remove('empty');
            }
        }
    }
    
    function removeStream(id) {
        const target = document.querySelector(`[data-video-id="${id}"]`);
        if (target) {
            target.remove();
            updateStreamList(); // リストを再描画
        }
    }

    function removeStream(id) {
        const target = document.querySelector(`[data-video-id="${id}"]`);
        if (target) {
            target.remove();
            
            // --- 追加：拡張機能に停止を依頼 ---
            window.postMessage({
                type: "REMOVE_STREAM_REQUEST",
                videoId: id
            }, "*");
            
            const sidebar = document.getElementById('sidebar');
            if (sidebar && document.querySelectorAll('.video-window').length === 0) {
                sidebar.classList.add('empty');
            }
            updateStreamList();
        }
    }

    // リサイズ追従用の変数
    let lastWindowWidth = window.innerWidth;
    let lastWindowHeight = window.innerHeight;
    
    window.addEventListener('resize', () => {
        const newWidth = window.innerWidth;
        const newHeight = window.innerHeight;
    
        // 倍率を計算
        const scaleX = newWidth / lastWindowWidth;
        const scaleY = newHeight / lastWindowHeight;
    
        // 全ての動画ウィンドウを走査して位置とサイズを更新
        document.querySelectorAll('.video-window').forEach(win => {
            const rect = win.getBoundingClientRect();
    
            // 新しい位置とサイズを計算
            const nextLeft = rect.left * scaleX;
            const nextTop = rect.top * scaleY;
            const nextWidth = rect.width * scaleX;
            const nextHeight = rect.height * scaleY;
    
            // 最小サイズ（200x120）を下回らないように適用
            win.style.left = nextLeft + 'px';
            win.style.top = nextTop + 'px';
            win.style.width = Math.max(200, nextWidth) + 'px';
            win.style.height = Math.max(120, nextHeight) + 'px';
        });
    
        // 現在のサイズを保存
        lastWindowWidth = newWidth;
        lastWindowHeight = newHeight;
    });

    window.addEventListener("message", (event) => {
        // === デバッグ用ログ出力（ここから） ===
        if (event.data && event.data.type === "FROM_EXTENSION") {
            console.log("%c[Extension -> HTML] メッセージを受信しました", "background: #222; color: #bada55; padding: 2px 5px;");
            console.log("受信データ:", event.data.data);
        }
        // === デバッグ用ログ出力（ここまで） ===
    
        // 1. YouTube Player API からのメッセージ（再生・停止ボタンの同期）
        try {
            if (typeof event.data === 'string') {
                const msg = JSON.parse(event.data);
                if (msg.event === 'infoDelivery' && msg.info) {
                    const frames = document.querySelectorAll('iframe.main-video');
                    frames.forEach(frame => {
                        if (frame.contentWindow === event.source) {
                            const win = frame.closest('.video-window');
                            if (win && msg.info.currentTime !== undefined) {
                                // 再生時間を拡張機能へ転送
                                window.postMessage({
                                    type: "SYNC_TIME_REQUEST",
                                    videoId: win.dataset.videoId,
                                    time: msg.info.currentTime
                                }, "*");
                            }
                        }
                    });
                }
            }
        } catch (e) {}
    
        // 2. 拡張機能からのコメント受信（アーカイブ対応・データ構造補正付き）
        if (event.data && event.data.type === "FROM_EXTENSION") {
            // --- 修正：データの二重構造を解消 ---
            // background.jsの送り方によって data.data になっている場合と data になっている場合の両方に対応
            const rawData = event.data.data;
            const data = (rawData && rawData.data) ? rawData.data : rawData;
    
            if (!data || !data.videoId) {
                console.warn("[Holo-Relay] 受信データの形式が不正です。videoIdが見つかりません:", data);
                return;
            }
    
            // コメント描画を実行する内部関数
            const renderComment = (retryCount = 0) => {
                const targetId = data.videoId.trim();
                const win = document.querySelector(`[data-video-id="${targetId}"]`);
                
                // ウィンドウがまだない場合は最大1秒間リトライ（100ms x 10回）
                if (!win) {
                    if (retryCount < 10) {
                        setTimeout(() => renderComment(retryCount + 1), 100);
                    } else {
                        const existingIds = Array.from(document.querySelectorAll('.video-window'))
                                                 .map(el => el.dataset.videoId);
                        console.warn(`[Holo-Relay] Window not found: ${targetId}. 存在するID一覧:`, existingIds);
                    }
                    return;
                }
    
                const canvas = win.querySelector('.comment-canvas');
                const showChecked = win.querySelector('.cfg-show')?.checked;
    
                if (showChecked && canvas) {
                    const el = document.createElement('div');
                    el.className = 'comment-text';
                    
                    // 属性判定（メンバーシップ・スパチャ）
                    const isMember = data.type === 'member' || data.isMember;
                    const isSupa = data.type === 'super-chat' || (data.amount && data.amount !== "");
    
                    if (isMember) el.classList.add('is-member');
                    if (isSupa) el.classList.add('is-supa');
    
                    el.innerHTML = data.text || "";
                    
                    // 設定値の取得
                    const size = parseInt(win.querySelector('.cfg-size')?.value) || 24;
                    const speedValue = parseInt(win.querySelector('.cfg-speed')?.value) || 10;
                    // 速度計算: duration（ミリ秒）を算出
                    const duration = (22 - speedValue) * 800;
    
                    el.style.fontSize = size + 'px';
                    // 縦位置をランダムに配置
                    el.style.top = (Math.floor(Math.random() * 15) * 6) + '%';
                    
                    canvas.appendChild(el);
    
                    // アニメーション実行
                    const startTime = performance.now();
                    const canvasWidth = canvas.offsetWidth;
                    const elWidth = el.offsetWidth || (size * (el.innerText?.length || 5));
                    const distance = canvasWidth + elWidth + 100;
    
                    function animate(time) {
                        const elapsed = time - startTime;
                        const progress = elapsed / duration;
                        // 右から左へ移動
                        el.style.transform = `translateX(-${distance * progress}px)`;
                        
                        if (progress < 1) {
                            requestAnimationFrame(animate);
                        } else {
                            el.remove();
                        }
                    }
                    requestAnimationFrame(animate);
                }
            };
    
            renderComment();
        }
    });
    
    // --- 追加：アーカイブ配信の再生同期処理（2秒おき） ---
    setInterval(() => {
        document.querySelectorAll('.video-window').forEach(win => {
            const videoId = win.dataset.videoId;
            const frame = win.querySelector('iframe.main-video');
            // 必要に応じて拡張機能側へポーリング要求を送るなどの拡張が可能
        });
    }, 2000);
</script>
