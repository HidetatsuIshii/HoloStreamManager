<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HoloStreamer Pro - Flexible Canvas</title>
    <style>
        :root {
            --bg-dark: #050505;
            --panel-bg: rgba(20, 20, 20, 0.98);
            --accent: #00d4ff;
            --text: #e0e0e0;
            --member-green: #2ba640;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: var(--bg-dark); color: var(--text);
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* サイドバー */
        #sidebar {
            position: fixed; top: 0; left: 0; width: 280px; height: 100%;
            background: var(--panel-bg); border-right: 1px solid #444;
            z-index: 9999; transition: transform 0.3s ease;
            transform: translateX(-270px);
        }
        #sidebar.active, #sidebar.empty { transform: translateX(0); }
        .sidebar-content { padding: 20px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
        
        textarea {
            width: 100%; height: 100px; background: #111; color: #0f0;
            border: 1px solid #333; border-radius: 4px; padding: 10px;
            box-sizing: border-box; font-family: monospace; font-size: 11px;
        }

        #stream-manager { margin-top: 20px; flex: 1; overflow-y: auto; }
        .stream-item {
            background: #222; margin-bottom: 5px; padding: 8px;
            border-radius: 4px; display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; border-left: 3px solid #555;
        }

        /* ビデオウィンドウ */
        #canvas { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        .video-window {
            position: absolute; width: 480px; height: 270px;
            background: #000; border: 2px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            display: flex; flex-direction: column;
            overflow: hidden;
            min-width: 150px; min-height: 100px;
            /* JSリサイズのため resize:both は削除 */
        }

        .video-content { flex: 1; position: relative; width: 100%; height: 100%; }
        iframe.main-video { width: 100%; height: 100%; border: none; pointer-events: none; }
        .video-window.interacting iframe.main-video { pointer-events: auto; }
        
        .drag-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; cursor: move; background: transparent;
        }
        .video-window.interacting .drag-overlay { pointer-events: none; }

        /* 個別設定パネル */
        .individual-config {
            position: absolute; top: 8px; left: 8px;
            background: rgba(0,0,0,0.85); padding: 8px; border-radius: 4px;
            display: none; z-index: 200; font-size: 10px; width: 110px;
            border: 1px solid #444; transform: scale(0.8); transform-origin: top left;
        }
        .video-window:hover .individual-config { display: block; }

        .comment-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; overflow: hidden; }
        .comment-text { position: absolute; white-space: nowrap; font-weight: 900; color: white; text-shadow: 2px 2px 2px #000; will-change: transform; }

        button { cursor: pointer; border: none; font-weight: bold; border-radius: 3px; }
        .apply-btn { width: 100%; padding: 10px; background: var(--accent); color: #000; margin-top: 10px; }
        .item-btn { padding: 4px 8px; font-size: 10px; background: #600; color: #fff; }
    </style>
</head>
<body>

<div id="sidebar" class="empty">
    <div class="sidebar-content">
        <h2 style="color: var(--accent); margin-bottom: 5px; font-size: 18px;">HoloStreamer Pro</h2>
        <textarea id="url-list" placeholder="URLを入力..."></textarea>
        <button class="apply-btn" onclick="applyStreams()">キャンバスに展開</button>
        
        <div id="stream-manager">
            <p style="font-size: 10px; color: #666; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 15px;">ACTIVE STREAMS</p>
            <div id="stream-list"></div>
        </div>

        <div style="font-size:9px; color:#555; margin-top: auto; padding-top: 10px;">
            ・背景クリック：全画面切替<br>
            ・右クリック：最前面へ移動<br>
            ・枠の縁をドラッグ：サイズ変更
        </div>
    </div>
</div>

<div id="canvas" onclick="handleCanvasClick(event)"></div>

<script>
    let commentQueue = [];
    let isProcessingQueue = false;
    let windowZIndex = 100;

    const sidebar = document.getElementById('sidebar');
    window.addEventListener('mousemove', (e) => {
        if (e.clientX < 20) sidebar.classList.add('active');
        else if (e.clientX > 300) sidebar.classList.remove('active');
    });

    function handleCanvasClick(e) {
        if (e.target.id === 'canvas') {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }
    }

    window.addEventListener("message", (event) => {
        if (event.data && event.data.type === "FROM_EXTENSION") {
            commentQueue.push(event.data.data);
            if (!isProcessingQueue) processQueue();
        }
    });

    async function processQueue() {
        if (commentQueue.length === 0) { isProcessingQueue = false; return; }
        isProcessingQueue = true;
        const data = commentQueue.shift();
        const win = Array.from(document.querySelectorAll('.video-window')).find(w => w.dataset.videoId === data.videoId);
        if (win) createComment(win, data);
        setTimeout(processQueue, 10);
    }

    function createComment(win, data) {
        if (!win.querySelector('.cfg-show').checked) return;
        const size = win.querySelector('.cfg-size').value;
        const speedVal = win.querySelector('.cfg-speed').value;
        // スピードロジック: 10を基準に、大きいほど速く（durationが短く）なる
        const duration = (22 - speedVal) * 800;

        const el = document.createElement('div');
        el.className = `comment-text`;
        el.innerHTML = data.text;
        if (data.type === 'super-chat') {
            el.innerHTML = `<span style="background:${data.color};color:#000;padding:1px 4px;border-radius:3px;margin-right:5px;font-size:0.8em;">${data.amount}</span>` + data.text;
            el.style.color = data.color;
        } else if (data.type === 'member') {
            el.style.color = 'var(--member-green)';
        }
        
        el.style.fontSize = size + 'px';
        const canvas = win.querySelector('.comment-canvas');
        el.style.top = Math.random() * win.querySelector('.cfg-range').value + '%';
        el.style.left = '100%';
        canvas.appendChild(el);

        const startTime = performance.now();
        function animate(time) {
            const progress = (time - startTime) / duration;
            el.style.transform = `translateX(-${(win.offsetWidth + 800) * progress}px)`;
            if (progress < 1) requestAnimationFrame(animate); else el.remove();
        }
        requestAnimationFrame(animate);
    }

    function applyStreams() {
        const ids = document.getElementById('url-list').value.split(/\s+/).map(url => {
            const m = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
            return m ? m[1] : null;
        }).filter(id => id);

        if (ids.length > 0) sidebar.classList.remove('empty');
        ids.forEach((id, index) => {
            if (document.querySelector(`[data-video-id="${id}"]`)) return;
            createVideoWindow(id, index);
        });
        window.postMessage({ type: "START_POLLING_REQUEST", videoIds: ids }, "*");
        updateStreamList();
    }

    function createVideoWindow(id, index) {
        const win = document.createElement('div');
        win.className = 'video-window';
        win.dataset.videoId = id;
        win.style.left = (100 + (index % 4) * 50) + 'px';
        win.style.top = (100 + Math.floor(index / 4) * 50) + 'px';
        win.style.zIndex = windowZIndex++;

        win.innerHTML = `
            <div class="individual-config">
                <label><input type="checkbox" class="cfg-show" checked> 表示</label><br>
                サイズ <input type="range" class="cfg-size" min="10" max="60" value="24" style="width:100%"><br>
                速度 <input type="range" class="cfg-speed" min="1" max="20" value="10" style="width:100%"><br>
                範囲 <input type="range" class="cfg-range" min="10" max="95" value="80" style="width:100%">
            </div>
            <div class="video-content">
                <div class="drag-overlay"></div>
                <iframe class="main-video" src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0" allow="autoplay; encrypted-media; fullscreen"></iframe>
                <div class="comment-canvas"></div>
            </div>
        `;

        // --- リサイズ & ドラッグ ロジック ---
        let isResizing = false;
        let currentHandle = null;

        win.onmousemove = (e) => {
            if (win.classList.contains('interacting')) return;
            const rect = win.getBoundingClientRect();
            const border = 8;
            let cursor = '';
            
            if (e.clientY - rect.top < border) cursor += 'n';
            else if (rect.bottom - e.clientY < border) cursor += 's';
            if (e.clientX - rect.left < border) cursor += 'w';
            else if (rect.right - e.clientX < border) cursor += 'e';
            
            win.style.cursor = cursor ? cursor + '-resize' : 'default';
            currentHandle = cursor;
        };

        win.onmousedown = (e) => {
            if (win.style.cursor.includes('resize')) {
                isResizing = true;
                const startW = win.offsetWidth;
                const startH = win.offsetHeight;
                const startX = e.clientX;
                const startY = e.clientY;
                const startL = win.offsetLeft;
                const startT = win.offsetTop;

                const onMouseMove = (ev) => {
                    if (currentHandle.includes('e')) win.style.width = startW + (ev.clientX - startX) + 'px';
                    if (currentHandle.includes('s')) win.style.height = startH + (ev.clientY - startY) + 'px';
                    if (currentHandle.includes('w')) {
                        win.style.width = startW - (ev.clientX - startX) + 'px';
                        win.style.left = startL + (ev.clientX - startX) + 'px';
                    }
                    if (currentHandle.includes('n')) {
                        win.style.height = startH - (ev.clientY - startY) + 'px';
                        win.style.top = startT + (ev.clientY - startY) + 'px';
                    }
                };
                const onMouseUp = () => {
                    isResizing = false;
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                };
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
                e.preventDefault();
            }
        };

        // ドラッグ（中央部分）
        const overlay = win.querySelector('.drag-overlay');
        overlay.onmousedown = (e) => {
            if (isResizing) return;
            win.style.zIndex = windowZIndex++;
            let shiftX = e.clientX - win.getBoundingClientRect().left;
            let shiftY = e.clientY - win.getBoundingClientRect().top;
            const onMouseMove = (ev) => {
                win.style.left = ev.pageX - shiftX + 'px';
                win.style.top = ev.pageY - shiftY + 'px';
            };
            document.addEventListener('mousemove', onMouseMove);
            document.onmouseup = () => {
                document.removeEventListener('mousemove', onMouseMove);
                document.onmouseup = null;
            };
        };

        overlay.ondblclick = () => win.classList.add('interacting');
        window.addEventListener('mousedown', (e) => {
            if (!win.contains(e.target)) win.classList.remove('interacting');
        });

        // 右クリックで最前面
        win.oncontextmenu = (e) => {
            e.preventDefault();
            win.style.zIndex = windowZIndex++;
        };

        document.getElementById('canvas').appendChild(win);
    }

    function updateStreamList() {
        const list = document.getElementById('stream-list');
        list.innerHTML = '';
        document.querySelectorAll('.video-window').forEach(win => {
            const id = win.dataset.videoId;
            const item = document.createElement('div');
            item.className = 'stream-item';
            item.innerHTML = `<span>ID: ${id.substring(0,8)}...</span><button class="item-btn" onclick="removeStream('${id}')">✕</button>`;
            list.appendChild(item);
        });
    }

    function removeStream(id) {
        const target = document.querySelector(`[data-video-id="${id}"]`);
        if (target) target.remove();
        if (document.querySelectorAll('.video-window').length === 0) sidebar.classList.add('empty');
        updateStreamList();
    }
</script>
</body>
</html>
