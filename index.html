<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HoloStreamer Pro - Command Center</title>
    <style>
        :root {
            --bg-dark: #050505;
            --panel-bg: rgba(25, 25, 25, 0.98);
            --accent: #00d4ff;
            --text: #e0e0e0;
            --sidebar-width: 300px;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: var(--bg-dark); color: var(--text);
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* サイドバー開閉ボタン (Gemini風) */
        #menu-toggle {
            position: fixed; top: 15px; left: 15px; width: 40px; height: 40px;
            background: rgba(40, 40, 40, 0.5); border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; z-index: 10001; transition: background 0.2s; border: 1px solid rgba(255,255,255,0.1);
        }
        #menu-toggle:hover { background: rgba(80, 80, 80, 0.8); }
        #menu-toggle span { width: 18px; height: 2px; background: white; margin: 2px 0; border-radius: 1px; }

        /* サイドバー */
        #sidebar {
            position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100%;
            background: var(--panel-bg); border-right: 1px solid #333;
            z-index: 10000; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-100%); display: flex; flex-direction: column;
        }
        #sidebar.open { transform: translateX(0); }

        .sidebar-inner { padding: 60px 20px 20px 20px; overflow-y: auto; flex: 1; }
        
        /* レイアウト切替ボタン */
        .layout-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
        .layout-btn { background: #333; padding: 8px; font-size: 11px; color: #fff; text-align: center; border: 1px solid #444; }
        .layout-btn:hover { background: var(--accent); color: #000; }

        /* ホロライブチャンネルリスト */
        .channel-list { margin-top: 20px; }
        .channel-header { font-size: 12px; color: #888; margin-bottom: 10px; display: flex; align-items: center; }
        .channel-item {
            display: flex; align-items: center; padding: 8px 10px; cursor: pointer;
            border-radius: 8px; transition: background 0.2s; margin-bottom: 2px;
        }
        .channel-item:hover { background: rgba(255,255,255,0.05); }
        .channel-icon { width: 32px; height: 32px; border-radius: 50%; margin-right: 12px; background: #444; }
        .channel-name { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .live-dot { width: 4px; height: 4px; background: #00aaff; border-radius: 50%; margin-left: 5px; }

        /* ビデオウィンドウ */
        #canvas { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        .video-window {
            position: absolute; background: #000; border: 2px solid #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .video-window.moving { transition: none; }
        iframe.main-video { width: 100%; height: 100%; border: none; pointer-events: none; }
        .video-window.interacting iframe.main-video { pointer-events: auto; }
        .drag-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: move; }

        #global-guard { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9000; display: none; }

        /* 設定メニュー（左上） */
        .individual-config {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.9); padding: 8px;
            border-radius: 6px; display: none; z-index: 200; width: 130px; border: 1px solid #555; transform: scale(0.85); transform-origin: top left;
        }
        .video-window:hover .individual-config { display: block; }

        .comment-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; overflow: hidden; }
        .comment-text { position: absolute; white-space: nowrap; font-weight: 900; color: white; text-shadow: 2px 2px 2px #000; }
        .comment-text img { height: 1.2em; vertical-align: middle; }
    </style>
</head>
<body>

<div id="global-guard"></div>

<div id="menu-toggle" onclick="toggleSidebar()">
    <span></span><span></span><span></span>
</div>

<div id="sidebar">
    <div class="sidebar-inner">
        <p style="color:var(--accent); font-weight:bold; margin-bottom:15px;">Monitor Layout</p>
        <div class="layout-group">
            <button class="layout-btn" onclick="applyLayout(2)">2 画面</button>
            <button class="layout-btn" onclick="applyLayout(3)">3 画面</button>
            <button class="layout-btn" onclick="applyLayout(4)">4 画面</button>
            <button class="layout-btn" onclick="applyLayout(6)">6 画面</button>
        </div>

        <div class="channel-list">
            <div class="channel-header">登録チャンネル ></div>
            <div id="live-members">
                </div>
        </div>

        <p style="font-size:10px; color:#555; margin-top:30px;">URL直接入力</p>
        <textarea id="url-list" style="width:100%; height:60px; background:#111; color:#0f0; border:1px solid #333;"></textarea>
        <button onclick="addStreamsFromText()" style="width:100%; padding:8px; margin-top:5px; background:var(--accent); color:#000; border:none; font-weight:bold; cursor:pointer;">追加</button>
    </div>
</div>

<div id="canvas" onclick="handleCanvasClick(event)"></div>

<script>
    const members = [
        { name: "音ノ瀬らこ / Otonose Rako", id: "k-fA22Gsc98", icon: "https://yt3.ggpht.com/u_5YVvO1qO779WnK8D0MvR8m96p9K2o2mE2m7fB2fGv8p8p8p8p8p8p8p8p8p8p8=s88-c-k-c0x00ffffff-no-rj" },
        { name: "Pekora Ch. 兎田ぺこら", id: "VIs2L2fS_8M", icon: "https://yt3.ggpht.com/ytc/AIdro_nF7m6X3x_4p9Y6S7W0O9E9H9X9W9E9H9X9W9E9H9X9=s88-c-k-c0x00ffffff-no-rj" },
        { name: "ミリプロ - Million Production", id: "Fp8m6p9K2o2", icon: "https://yt3.ggpht.com/ytc/AIdro_m6p9K2o2mE2m7fB2fGv8p8p8p8p8p8p8p8p8p8p8=s88-c-k-c0x00ffffff-no-rj" },
        { name: "Noel Ch. 白銀ノエル", id: "bHnE4p9Y6S7", icon: "https://yt3.ggpht.com/ytc/AIdro_nE4p9Y6S7W0O9E9H9X9W9E9H9X9W9E9H9X9=s88-c-k-c0x00ffffff-no-rj" }
    ];

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function initMemberList() {
        const list = document.getElementById('live-members');
        members.forEach(m => {
            const item = document.createElement('div');
            item.className = 'channel-item';
            item.onclick = () => createVideoWindow(m.id);
            item.innerHTML = `
                <img class="channel-icon" src="${m.icon}">
                <div class="channel-name">${m.name}</div>
                <div class="live-dot"></div>
            `;
            list.appendChild(item);
        });
    }

    function applyLayout(count) {
        const windows = Array.from(document.querySelectorAll('.video-window'));
        const sw = window.innerWidth;
        const sh = window.innerHeight;

        windows.forEach((win, i) => {
            if (i >= count) return;
            let w, h, l, t;
            if (count === 2) { w = sw / 2; h = sh; l = (i % 2) * w; t = 0; }
            else if (count === 3) { 
                if (i === 0) { w = sw * 0.6; h = sh; l = 0; t = 0; }
                else { w = sw * 0.4; h = sh / 2; l = sw * 0.6; t = (i - 1) * h; }
            }
            else if (count === 4) { w = sw / 2; h = sh / 2; l = (i % 2) * w; t = Math.floor(i / 2) * h; }
            else if (count === 6) { w = sw / 3; h = sh / 2; l = (i % 3) * w; t = Math.floor(i / 3) * h; }

            win.style.width = w + 'px'; win.style.height = h + 'px';
            win.style.left = l + 'px'; win.style.top = t + 'px';
        });
        toggleSidebar();
    }

    function createVideoWindow(id) {
        if (document.querySelector(`[data-video-id="${id}"]`)) return;
        const win = document.createElement('div');
        win.className = 'video-window';
        win.dataset.videoId = id;
        win.style.width = '480px'; win.style.height = '270px';
        win.style.left = '100px'; win.style.top = '100px';
        win.style.zIndex = windowZIndex++;

        win.innerHTML = `
            <div class="individual-config">
                <button onclick="sendCommand('${id}', 'playVideo')">▶</button>
                <button onclick="sendCommand('${id}', 'pauseVideo')">Ⅱ</button>
                <input type="range" min="0" max="100" value="50" oninput="sendCommand('${id}', 'setVolume', [this.value])" style="width:100%"><br>
                <label><input type="checkbox" class="cfg-show" checked> 表示</label><br>
                速度 <input type="range" class="cfg-speed" min="1" max="20" value="10" style="width:100%">
            </div>
            <div class="video-content">
                <div class="drag-overlay"></div>
                <iframe class="main-video" src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&enablejsapi=1&rel=0" allow="autoplay; encrypted-media;"></iframe>
                <div class="comment-canvas"></div>
            </div>
        `;

        // リサイズ & ドラッグ処理（前回同様）
        setupInteractions(win);
        document.getElementById('canvas').appendChild(win);
    }

    function setupInteractions(win) {
        const overlay = win.querySelector('.drag-overlay');
        overlay.onmousedown = (e) => {
            win.classList.add('moving');
            win.style.zIndex = windowZIndex++;
            let shiftX = e.clientX - win.getBoundingClientRect().left;
            let shiftY = e.clientY - win.getBoundingClientRect().top;
            const onMove = (ev) => {
                win.style.left = ev.pageX - shiftX + 'px';
                win.style.top = ev.pageY - shiftY + 'px';
            };
            const onUp = () => {
                win.classList.remove('moving');
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
            };
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        };
        overlay.ondblclick = () => win.classList.add('interacting');
        win.oncontextmenu = (e) => { e.preventDefault(); win.style.zIndex = windowZIndex++; };
    }

    // 他、全画面、コマンド送信、コメント描画、追加ロジックは前回同様に統合
    initMemberList();
</script>
</body>
</html>
