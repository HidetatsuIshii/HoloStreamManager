<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HoloStreamer Pro - Dynamic Layout</title>
    <style>
        :root {
            --bg-dark: #000000;
            --panel-bg: rgba(20, 20, 20, 0.95);
            --accent: #00d4ff;
            --text: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-dark); color: var(--text);
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        /* 自動隠蔽サイドバー */
        #sidebar {
            position: fixed;
            top: 0; left: 0;
            width: 300px; height: 100%;
            background: var(--panel-bg);
            border-right: 1px solid #333;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-290px); /* 10pxだけ残して隠す */
        }

        #sidebar:hover, #sidebar.active {
            transform: translateX(0);
        }

        /* サイドバー内のコンテンツ */
        .sidebar-content { padding: 20px; }
        h2 { font-size: 1.1rem; color: var(--accent); margin-top: 0; }

        textarea {
            width: 100%; height: 120px;
            background: #1e1e1e; color: #fff; border: 1px solid #444;
            border-radius: 4px; padding: 10px; box-sizing: border-box;
            font-family: monospace; font-size: 12px;
        }

        .hint { font-size: 0.7rem; opacity: 0.6; margin: 10px 0; }

        /* メイン視聴エリア（常に全画面） */
        #main-view {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        
        /* 配信数に応じてJSで制御するグリッド */
        #video-grid {
            width: 100%; height: 100%;
            display: grid;
            gap: 2px; /* 隙間を最小限に */
            background: #000;
        }

        .video-container {
            position: relative; width: 100%; height: 100%;
            background: #000; overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* コメント層 */
        .comment-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }
        .comment-text {
            position: absolute; white-space: nowrap; font-weight: bold;
            color: white; text-shadow: 1px 1px 2px #000, -1px -1px 0 #000;
            pointer-events: none; will-change: transform;
        }

        button {
            width: 100%; padding: 10px; background: var(--accent); border: none;
            color: #000; font-weight: bold; border-radius: 4px; cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-content">
        <h2>Settings</h2>
        <textarea id="url-list" placeholder="YouTube URLを入力..."></textarea>
        <p class="hint">マウスを左端に寄せると表示されます</p>
        <button onclick="applyStreams()">適用して全画面表示</button>
        
        <div style="margin-top:20px;">
            <label style="font-size: 12px;">文字サイズ</label>
            <input type="range" id="cfg-size" min="16" max="60" value="32" style="width:100%">
        </div>
    </div>
</div>

<div id="main-view">
    <div id="video-grid"></div>
</div>

<script>
    let hideTimer;

    // サイドバーの自動隠蔽ロジック
    const sidebar = document.getElementById('sidebar');
    sidebar.addEventListener('mousemove', () => {
        sidebar.classList.add('active');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
            sidebar.classList.remove('active');
        }, 3000); // 3秒間操作がないと隠す
    });

    function getYouTubeId(url) {
        const reg = /(?:v=|\/)([0-9A-Za-z_-]{11})/;
        const m = url.match(reg);
        return m ? m[1] : null;
    }

    function applyStreams() {
        const text = document.getElementById('url-list').value;
        const ids = text.split(/\s+/).map(getYouTubeId).filter(id => id);
        const grid = document.getElementById('video-grid');
        grid.innerHTML = '';

        if (ids.length === 0) return;

        // 配信数に応じた最適レイアウト
        const count = ids.length;
        let cols, rows;

        if (count === 1) {
            cols = 1; rows = 1;
        } else if (count === 2) {
            cols = 2; rows = 1; // 左右分割
        } else if (count <= 4) {
            cols = 2; rows = 2; // 田の字
        } else if (count <= 6) {
            cols = 3; rows = 2;
        } else {
            cols = Math.ceil(Math.sqrt(count));
            rows = Math.ceil(count / cols);
        }

        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

        ids.forEach(id => {
            const container = document.createElement('div');
            container.className = 'video-container';
            
            const iframe = document.createElement('iframe');
            iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1`;
            
            const overlay = document.createElement('div');
            overlay.className = 'comment-canvas';
            
            container.appendChild(iframe);
            container.appendChild(overlay);
            grid.appendChild(container);

            startDummyComments(overlay);
        });

        // 適用したらメニューを即座に隠す
        sidebar.classList.remove('active');
    }

    function createComment(container, text) {
        const el = document.createElement('div');
        el.className = 'comment-text';
        el.innerText = text;
        const size = document.getElementById('cfg-size').value;
        el.style.fontSize = size + 'px';
        el.style.top = Math.random() * 80 + '%';
        el.style.left = '100%';
        container.appendChild(el);

        const duration = 5000 + Math.random() * 3000;
        const startTime = performance.now();

        function animate(time) {
            const progress = (time - startTime) / duration;
            // 画面外（-150%程度）まで流す
            el.style.transform = `translateX(-${(100 + 200) * progress}vw)`;

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                el.remove();
            }
        }
        requestAnimationFrame(animate);
    }

    function startDummyComments(container) {
        const words = ["草", "w", "かわいい", "！？", "きたああ", "88888", "たすかる"];
        const loop = () => {
            if (Math.random() > 0.5) createComment(container, words[Math.floor(Math.random() * words.length)]);
            setTimeout(loop, 1000 + Math.random() * 2000);
        };
        loop();
    }
</script>

</body>
</html>
