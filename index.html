<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HoloStreamer Pro - Full Integration</title>
    <style>
        :root {
            --bg-dark: #000000;
            --panel-bg: rgba(20, 20, 20, 0.95);
            --accent: #00d4ff;
            --text: #e0e0e0;
            --member-green: #2ba640;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-dark); color: var(--text);
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        #sidebar {
            position: fixed; top: 0; left: 0; width: 300px; height: 100%;
            background: var(--panel-bg); border-right: 1px solid #333;
            z-index: 1000; transition: transform 0.4s; transform: translateX(-290px);
        }
        #sidebar:hover, #sidebar.active { transform: translateX(0); }
        .sidebar-content { padding: 20px; }
        
        textarea {
            width: 100%; height: 120px; background: #1e1e1e; color: #fff;
            border: 1px solid #444; border-radius: 4px; padding: 10px; box-sizing: border-box;
            font-family: monospace; font-size: 12px;
        }

        #main-view { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #video-grid { width: 100%; height: 100%; display: grid; gap: 2px; background: #000; }
        .video-container { position: relative; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        iframe.main-video { width: 100%; height: 100%; border: none; }
        
        .comment-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }

        .comment-text {
            position: absolute; white-space: nowrap; font-weight: 900;
            color: white; text-shadow: 2px 2px 2px #000, -1px -1px 0 #000;
            pointer-events: none; will-change: transform;
            display: flex; align-items: center;
            padding: 2px 10px; border-radius: 6px;
        }

        .comment-text.member { color: var(--member-green); }

        .comment-text.super-chat {
            z-index: 150;
            background: rgba(0, 0, 0, 0.4);
            border: 3px solid transparent; 
        }
        
        .sc-amount {
            color: #000; padding: 1px 6px; border-radius: 4px;
            margin-right: 8px; font-size: 0.85em; font-weight: bold; text-shadow: none;
        }

        .youtube-emoji { height: 1.2em; margin: 0 2px; vertical-align: middle; }
        button { width: 100%; padding: 10px; background: var(--accent); border: none; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-content">
        <h2>HoloStreamer Pro</h2>
        <textarea id="url-list" placeholder="YouTube URLを改行区切りで入力..."></textarea>
        <button onclick="applyStreams()">適用して表示</button>
        <div style="margin-top:20px;">
            <label style="font-size:12px;">文字サイズ</label><input type="range" id="cfg-size" min="16" max="60" value="32" style="width:100%">
            <label style="font-size:12px;">スピード</label><input type="range" id="cfg-speed" min="2" max="15" value="6" style="width:100%">
            <label style="font-size:12px;">出現範囲（縦）</label><input type="range" id="cfg-range" min="10" max="95" value="80" style="width:100%">
        </div>
    </div>
</div>

<div id="main-view"><div id="video-grid"></div></div>

<script>
    let commentQueue = [];
    let isProcessingQueue = false;
    const LANE_COUNT = 15;
    let lastUsedLanes = [];

    // メッセージ受信
    window.addEventListener("message", (event) => {
        if (event.data && event.data.type === "FROM_EXTENSION") {
            commentQueue.push(event.data.data);
            if (!isProcessingQueue) processQueue();
        }
    });

    async function processQueue() {
        if (commentQueue.length === 0) { isProcessingQueue = false; return; }
        isProcessingQueue = true;
        const data = commentQueue.shift();
        const container = Array.from(document.querySelectorAll('.video-container')).find(c => c.dataset.videoId === data.videoId);
        if (container) createComment(container.querySelector('.comment-canvas'), data);
        setTimeout(processQueue, commentQueue.length > 20 ? 5 : 50);
    }

    // レイアウト設定関数（ここが不足していました）
    function setupLayout(count) {
        const grid = document.getElementById('video-grid');
        let cols, rows;
        if (count === 1) { cols = 1; rows = 1; }
        else if (count === 2) { cols = 2; rows = 1; }
        else if (count <= 4) { cols = 2; rows = 2; }
        else {
            cols = Math.ceil(Math.sqrt(count));
            rows = Math.ceil(count / cols);
        }
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    }

    function createComment(container, data) {
        const el = document.createElement('div');
        el.className = `comment-text ${data.type}`;

        let html = "";
        if (data.type === 'super-chat') {
            el.style.borderColor = data.color;
            el.style.backgroundColor = `${data.color}33`;
            html += `<span class="sc-amount" style="background-color: ${data.color}">${data.amount}</span>`;
        }
        html += data.text;
        el.innerHTML = html;

        const size = document.getElementById('cfg-size').value;
        const speed = document.getElementById('cfg-speed').value;
        const range = document.getElementById('cfg-range').value;

        const availableLanes = [];
        for (let i = 0; i < LANE_COUNT; i++) if (!lastUsedLanes.includes(i)) availableLanes.push(i);
        if (availableLanes.length === 0) { lastUsedLanes = []; for (let i = 0; i < LANE_COUNT; i++) availableLanes.push(i); }
        const laneIndex = availableLanes[Math.floor(Math.random() * availableLanes.length)];
        lastUsedLanes.push(laneIndex);
        if (lastUsedLanes.length > 5) lastUsedLanes.shift();

        el.style.fontSize = size + 'px';
        el.style.top = (laneIndex * (range / LANE_COUNT)) + '%';
        el.style.left = '100%';
        container.appendChild(el);

        const duration = (parseFloat(speed) * 1000) + (Math.random() * 1000);
        const startTime = performance.now();

        function animate(time) {
            const progress = (time - startTime) / duration;
            el.style.transform = `translateX(-${(100 + 150) * progress}vw)`;
            if (progress < 1) requestAnimationFrame(animate); else el.remove();
        }
        requestAnimationFrame(animate);
    }

    function getYouTubeId(url) { const m = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/); return m ? m[1] : null; }

    function applyStreams() {
        const ids = document.getElementById('url-list').value.split(/\s+/).map(getYouTubeId).filter(id => id);
        const grid = document.getElementById('video-grid');
        grid.innerHTML = '';
        if (ids.length === 0) return;

        setupLayout(ids.length);

        ids.forEach(id => {
            const container = document.createElement('div');
            container.className = 'video-container';
            container.dataset.videoId = id;
            
            // メインプレイヤー
            const iframe = document.createElement('iframe');
            iframe.className = 'main-video';
            iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1`;
            
            // 隠しチャット（ギフト受け取り資格用）
            const hiddenChat = document.createElement('iframe');
            hiddenChat.src = `https://www.youtube.com/live_chat?v=${id}`;
            hiddenChat.style.position = 'absolute';
            hiddenChat.style.width = '0px';
            hiddenChat.style.height = '0px';
            hiddenChat.style.border = 'none';
            hiddenChat.style.opacity = '0';
            
            const overlay = document.createElement('div');
            overlay.className = 'comment-canvas';
            
            container.appendChild(iframe);
            container.appendChild(hiddenChat);
            container.appendChild(overlay);
            grid.appendChild(container);
        });

        window.postMessage({ type: "START_POLLING_REQUEST", videoIds: ids }, "*");
    }
</script>
</body>
</html>
