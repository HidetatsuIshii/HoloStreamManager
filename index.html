<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HoloStreamer Pro - Dynamic Layout & Live Chat</title>
    <style>
        :root {
            --bg-dark: #000000;
            --panel-bg: rgba(20, 20, 20, 0.95);
            --accent: #00d4ff;
            --text: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-dark); color: var(--text);
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        #sidebar {
            position: fixed;
            top: 0; left: 0;
            width: 300px; height: 100%;
            background: var(--panel-bg);
            border-right: 1px solid #333;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-290px);
        }

        #sidebar:hover, #sidebar.active {
            transform: translateX(0);
        }

        .sidebar-content { padding: 20px; }
        h2 { font-size: 1.1rem; color: var(--accent); margin-top: 0; }

        textarea {
            width: 100%; height: 120px;
            background: #1e1e1e; color: #fff; border: 1px solid #444;
            border-radius: 4px; padding: 10px; box-sizing: border-box;
            font-family: monospace; font-size: 12px;
        }

        .hint { font-size: 0.7rem; opacity: 0.6; margin: 10px 0; }

        #main-view {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        
        #video-grid {
            width: 100%; height: 100%;
            display: grid;
            gap: 2px;
            background: #000;
        }

        .video-container {
            position: relative; width: 100%; height: 100%;
            background: #000; overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .comment-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }
        .comment-text {
            position: absolute; white-space: nowrap; font-weight: bold;
            color: white; text-shadow: 2px 2px 2px #000, -1px -1px 0 #000;
            pointer-events: none; will-change: transform;
        }

        button {
            width: 100%; padding: 10px; background: var(--accent); border: none;
            color: #000; font-weight: bold; border-radius: 4px; cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-content">
        <h2>HoloStreamer Pro</h2>
        <textarea id="url-list" placeholder="YouTube URLを入力..."></textarea>
        <p class="hint">マウスを左端に寄せると表示されます</p>
        <button onclick="applyStreams()">適用して全画面表示</button>
        
        <div style="margin-top:20px;">
            <label style="font-size: 12px;">文字サイズ</label>
            <input type="range" id="cfg-size" min="16" max="60" value="32" style="width:100%">
            
            <label style="font-size: 12px; margin-top:10px; display:block;">流れるスピード (秒)</label>
            <input type="range" id="cfg-speed" min="2" max="15" value="6" step="1" style="width:100%">
            <span style="font-size:10px;">※短いほど速い</span>
        
            <label style="font-size: 12px; margin-top:10px; display:block;">出現範囲（縦）</label>
            <input type="range" id="cfg-range" min="10" max="95" value="80" style="width:100%">
        </div>
    </div>
</div>

<div id="main-view">
    <div id="video-grid"></div>
</div>

<script>
    let hideTimer;

    // --- メッセージ受信（receiver.jsからのバケツリレー） ---
    window.addEventListener("message", (event) => {
        if (event.data && event.data.type === "FROM_EXTENSION") {
            const { videoId, text } = event.data.data;
            
            const targetContainer = Array.from(document.querySelectorAll('.video-container'))
                .find(c => c.dataset.videoId === videoId);
            
            if (targetContainer) {
                const overlay = targetContainer.querySelector('.comment-canvas');
                // テキストのみを表示（ユーザー名は含めない）
                createComment(overlay, text);
            }
        }
    });

    const sidebar = document.getElementById('sidebar');
    sidebar.addEventListener('mousemove', () => {
        sidebar.classList.add('active');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
            sidebar.classList.remove('active');
        }, 3000);
    });

    function getYouTubeId(url) {
        const reg = /(?:v=|\/)([0-9A-Za-z_-]{11})/;
        const m = url.match(reg);
        return m ? m[1] : null;
    }

    function setupLayout(count) {
        const grid = document.getElementById('video-grid');
        let cols, rows;

        if (count === 1) { cols = 1; rows = 1; }
        else if (count === 2) { cols = 2; rows = 1; }
        else if (count <= 4) { cols = 2; rows = 2; }
        else if (count <= 6) { cols = 3; rows = 2; }
        else {
            cols = Math.ceil(Math.sqrt(count));
            rows = Math.ceil(count / cols);
        }

        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    }

    async function applyStreams() {
        const textInput = document.getElementById('url-list').value;
        const ids = textInput.split(/\s+/).map(getYouTubeId).filter(id => id);
        const grid = document.getElementById('video-grid');
        grid.innerHTML = '';

        if (ids.length === 0) return;

        setupLayout(ids.length);

        ids.forEach(id => {
            const container = document.createElement('div');
            container.className = 'video-container';
            container.dataset.videoId = id;
            
            const iframe = document.createElement('iframe');
            iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1`;
            
            const overlay = document.createElement('div');
            overlay.className = 'comment-canvas';
            
            container.appendChild(iframe);
            container.appendChild(overlay);
            grid.appendChild(container);
        });

        // 拡張機能のbackground.jsへ「この動画のチャット取得を開始せよ」と命令
        // receiver.js経由ではなく、ページ上のスクリプトから直接送信を試みる（権限があれば）
        // もし動かなければ、ここはreceiver.js側に転送ロジックが必要ですが、
        // 一般的には以下のchrome.runtime.sendMessageは拡張機能ドメインでないと失敗します。
        // なので、今回は window.postMessage で receiver.js に「取得開始」を伝えます。
        window.postMessage({ type: "START_POLLING_REQUEST", videoIds: ids }, "*");

        sidebar.classList.remove('active');
    }

    function createComment(container, text) {
        const el = document.createElement('div');
        el.className = 'comment-text';
        el.innerText = text;

        const size = document.getElementById('cfg-size').value;
        const speed = document.getElementById('cfg-speed').value;
        const range = document.getElementById('cfg-range').value;

        el.style.fontSize = size + 'px';
        el.style.top = Math.random() * range + '%';
        el.style.left = '100%';
        container.appendChild(el);

        const duration = (parseFloat(speed) * 1000) + (Math.random() * 1000);
        const startTime = performance.now();

        function animate(time) {
            const progress = (time - startTime) / duration;
            el.style.transform = `translateX(-${(100 + 150) * progress}vw)`;

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                el.remove();
            }
        }
        requestAnimationFrame(animate);
    }
</script>

</body>
</html>
