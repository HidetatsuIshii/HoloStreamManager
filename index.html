<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ホロストリーマー</title>
    <style>
        :root {
            --bg-dark: #050505;
            --panel-bg: rgba(20, 20, 20, 0.98);
            --accent: #00d4ff;
            --text: #e0e0e0;
            --member-green: #2ba640;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: var(--bg-dark); color: var(--text);
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* スパチャ用背景（半透明） */
        .is-supa {
            background: rgba(255, 215, 0, 0.3); /* ゴールド系の半透明 */
            border-radius: 4px;
            padding: 2px 8px;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }
        
        /* メンバーシップ用の色（!importantで確実に適用） */
        .is-member {
            color: #2ba640 !important; /* 直接指定 */
            text-shadow: 1px 1px 1px #000, -1px -1px 1px #000 !important;
        }

        /* ハンバーガーボタンのスタイル */
        #menu-trigger {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 40px;
            height: 40px;
            background: var(--panel-bg);
            border: 1px solid #444;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10001; 
            transition: opacity 0.2s ease, visibility 0.2s; /* アニメーションを不透明度に変更 */
        }
        
        #menu-trigger:hover {
            background: #333;
        }
        
        .bar {
            width: 20px;
            height: 2px;
            background: var(--accent);
            margin: 2px 0;
        }

        /* サイドバーが active または empty (初期) のときはボタンを消す */
        #sidebar.active ~ #menu-trigger,
        #sidebar.empty ~ #menu-trigger {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        /* サイドバーの初期状態（画面外へ） */
        #sidebar {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 280px; 
            height: 100%;
            background: var(--panel-bg); 
            border-right: 1px solid #444;
            z-index: 10000; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* 動きを滑らかに */
            transform: translateX(-100%); /* 完全に隠す */
        }
        /* 表示状態 */
        #sidebar.active { 
            transform: translateX(0); 
        }
        
        /* 初回起動時（URL入力前）もサイドバーを出しておくならここ */
        #sidebar.empty { 
            transform: translateX(0); 
        }
        
        /* --- サイドバーの中身をスクロール可能に修正 --- */
        .sidebar-content { 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; /* 画面いっぱいの高さに固定 */
            box-sizing: border-box; 
            overflow-y: auto; /* 縦スクロールを有効化 */
        }
        /* スクロールバーのデザイン（任意：暗い背景に合わせる） */
        .sidebar-content::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar-content::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
        
        textarea {
            width: 100%; height: 100px; background: #111; color: #0f0;
            border: 1px solid #333; border-radius: 4px; padding: 10px;
            box-sizing: border-box; font-family: monospace; font-size: 11px;
        }

        #stream-manager { margin-top: 20px; flex: 1; overflow-y: auto; }
        .stream-item button {
            background: #444;
            transition: background 0.2s;
        }
        .stream-item button:hover {
            background: #ff4444; /* ホバーで赤く */
        }

        /* ビデオウィンドウ */
        #canvas { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        .video-window {
            position: absolute; width: 480px; height: 270px;
            background: #000; border: 2px solid #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
            overflow: hidden; min-width: 200px; min-height: 120px;
            transition: width 0.15s, height 0.15s, left 0.15s, top 0.15s, border-color 0.2s;
            max-width: 100vw; max-height: 100vh;
        }
        .video-window.moving { transition: none; } /* 移動・リサイズ中はアニメオフ */

        .video-content { flex: 1; position: relative; width: 100%; height: 100%; }
        iframe.main-video { width: 100%; height: 100%; border: none; pointer-events: none; }
        .video-window.interacting iframe.main-video { pointer-events: auto; }
        
        /* 操作用透明レイヤー */
        .drag-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; cursor: move; background: transparent;
        }
        .video-window.interacting .drag-overlay { pointer-events: none; }

        /* リサイズ・ドラッグ中の全画面ガード */
        #global-guard {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9000; display: none; background: transparent;
        }

        /* サイドバーの配信中カード */
        /* 配信中リストのカードデザイン */
        .live-card {
            display: flex;
            gap: 10px;
            background: rgba(40, 40, 40, 0.5);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            align-items: center;
        }
        
        .live-card:hover {
            background: rgba(60, 60, 60, 0.8);
            border-color: var(--accent);
            transform: translateX(5px);
        }
        
        .live-thumb {
            width: 100px;
            height: 56px;
            object-fit: cover;
            border-radius: 4px;
            flex-shrink: 0;
        }
        
        .live-card-info {
            flex: 1;
            overflow: hidden;
        }
        
        .live-card-channel {
            font-size: 11px;
            color: var(--accent);
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .live-card-title {
            font-size: 10px;
            color: #ccc;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        /* 統合コントロールパネル */
        .individual-config {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(0,0,0,0.95);
            padding: 10px;
            border-radius: 6px;
            display: none;
            z-index: 5000; /* 十分に高い値に設定して最前面へ */
            font-size: 10px;
            width: 130px;
            border: 1px solid #555;
            transform: scale(0.85);
            transform-origin: top left;
            pointer-events: auto; /* 確実にクリックを有効化 */
        }
        .video-window:hover .individual-config { display: block; }
        .config-row { margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
        
        .comment-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; overflow: hidden; }
        .comment-text { position: absolute; white-space: nowrap; font-weight: 900; color: white; text-shadow: 2px 2px 2px #000; will-change: transform; }
        .comment-text img { height: 1.2em; vertical-align: middle; } /* 絵文字サイズ調整 */

        button { cursor: pointer; border: none; font-weight: bold; border-radius: 3px; background: #444; color: #fff; padding: 2px 6px; }
        .apply-btn { width: 100%; padding: 10px; background: var(--accent); color: #000; margin-top: 10px; }
        
        .quality-btn {
            background: #333;
            color: #888;
            font-size: 9px;
            padding: 2px 5px;
            border: 1px solid #444;
            min-width: 35px; /* テキスト長が変わってもガタつかないように固定 */
            transition: all 0.2s;
        }
        
        /* ON状態：水色に光る */
        .quality-btn.active {
            background: #444;
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 5px rgba(0, 212, 255, 0.3);
        }
        
        button.quality-btn:hover {
            background: #777;
        }

        .snap-preview {
            position: fixed;
            background: rgba(0, 212, 255, 0.2); /* アクセントカラーの薄い色 */
            border: 2px dashed var(--accent);
            pointer-events: none;
            z-index: 8500; /* ガードより手前、ウィンドウより奥 */
            display: none;
            transition: all 0.15s ease;
        }
    </style>
</head>
<body>

<div id="global-guard"></div>
<div id="snap-preview" class="snap-preview"></div>
    
<div id="sidebar" class="empty">
    <div class="sidebar-content">
        <h2 style="color: var(--accent); margin-bottom: 5px; font-size: 18px;">ホロストリーマー</h2>
        <textarea id="url-list" placeholder="URLを改行して入力..."></textarea>
        <button class="apply-btn" onclick="applyStreams()">キャンバスに展開</button>
        <div id="live-now-container" style="margin-top: 20px;">
            <p style="font-size: 10px; color: var(--accent); letter-spacing: 1px; margin-bottom: 8px; border-left: 2px solid var(--accent); padding-left: 8px;">LIVE NOW (Hololive)</p>
            <div id="hololive-live-list"></div>
        </div>
        <div id="stream-manager">
            <p style="font-size: 10px; color: #666; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 15px;">ACTIVE STREAMS</p>
            <div id="stream-list"></div>
        </div>
    </div>
</div>

<div id="menu-trigger" onclick="toggleSidebar()">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
</div>

<div id="canvas" onclick="handleCanvasClick(event)"></div>

<script>
    console.log("System Initializing..."); // これがコンソールに出るか確認
    let windowZIndex = 100;
    const guard = document.getElementById('global-guard');

    function handleCanvasClick(e) {
        const sidebar = document.getElementById('sidebar');
        
        // 1. サイドバーが表示されている場合
        if (sidebar.classList.contains('active')) {
            // クリックされたのが「サイドバーの外（canvas）」であれば閉じる
            if (e.target.id === 'canvas') {
                sidebar.classList.remove('active');
                return; // 閉じる動作を優先
            }
        }
    
        // 2. サイドバーが閉まっている状態でのキャンバスクリック（フルスクリーン制御）
        if (e.target.id === 'canvas') {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log("Fullscreen Error:", err);
                });
            } else {
                document.exitFullscreen();
            }
        }
    }

    function sendCommand(id, cmd, arg) {
        const frame = document.querySelector(`[data-video-id="${id}"] iframe.main-video`);
        if (frame) frame.contentWindow.postMessage(JSON.stringify({ event: 'command', func: cmd, args: arg || [] }), '*');
    }
    
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('active');
        // emptyクラスが付いていると消えない場合があるので、手動操作時は除去する
        if (sidebar.classList.contains('active')) {
            sidebar.classList.remove('empty');
        }
    }
    
    function applyStreams() {
        const sidebar = document.getElementById('sidebar');
        const urlInput = document.getElementById('url-list').value;
        
        // URLから動画IDを抽出
        const ids = urlInput.split(/\s+/).map(url => {
            const m = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
            return m ? m[1] : null;
        }).filter(id => id);
    
        if (ids.length > 0) {
            if (sidebar) sidebar.classList.remove('empty');
            
            window.postMessage({ 
                type: "START_POLLING_REQUEST", 
                videoIds: ids 
            }, "*");
            console.log("Polling request sent for:", ids);
        }
    
        ids.forEach((id, index) => {
            if (document.querySelector(`[data-video-id="${id}"]`)) return;
            createVideoWindow(id, index);
        });
        updateStreamList();
    }

    function togglePlay(id) {
        const win = document.querySelector(`[data-video-id="${id}"]`);
        const btn = win.querySelector('.play-pause-btn');
        if (btn.innerText === '▶') {
            sendCommand(id, 'playVideo');
            btn.innerText = 'Ⅱ';
        } else {
            sendCommand(id, 'pauseVideo');
            btn.innerText = '▶';
        }
    }

    function toggleHighQuality(id) {
        const btn = document.getElementById(`hq-btn-${id}`);
        if (!btn) return;
    
        const isCurrentlyAuto = !btn.classList.contains('active');
    
        if (isCurrentlyAuto) {
            // --- High設定へ切り替え ---
            sendCommand(id, 'setPlaybackQuality', ['highres']);
            btn.classList.add('active');
            btn.innerText = 'HQ'; // 表示テキスト
            btn.title = "最高画質: ON (クリックでAutoへ)";
        } else {
            // --- Auto設定へ切り替え ---
            sendCommand(id, 'setPlaybackQuality', ['default']);
            btn.classList.remove('active');
            btn.innerText = 'Auto'; // 表示をAutoに変えるとわかりやすいです
            btn.title = "最高画質: OFF (クリックでHighへ)";
        }
    }

    function createVideoWindow(id, index) {
        const win = document.createElement('div');
        win.className = 'video-window';
        win.dataset.videoId = id;
        win.style.left = (120 + (index % 3) * 60) + 'px';
        win.style.top = (120 + Math.floor(index / 3) * 60) + 'px';
        win.style.zIndex = windowZIndex++;

        win.innerHTML = `
            <div class="individual-config">
                <div class="config-row">
                    <div style="display:flex; gap:5px; margin-bottom:5px;">
                        <button class="play-pause-btn" onclick="togglePlay('${id}')">Ⅱ</button>
                        <button id="hq-btn-${id}" class="quality-btn active" onclick="toggleHighQuality('${id}')" title="最高画質: ON">HQ</button>
                    </div>
                    音量 <input type="range" min="0" max="100" value="50" oninput="sendCommand('${id}', 'setVolume', [this.value])" style="width:70px">
                </div>
                <div class="config-row">
                    <label><input type="checkbox" class="cfg-show" checked> 表示</label><br>
                    サイズ <input type="range" class="cfg-size" min="10" max="60" value="24" style="width:100%"><br>
                    速度 <input type="range" class="cfg-speed" min="1" max="20" value="10" style="width:100%">
                </div>
            </div>
            <div class="video-content">
                <div class="drag-overlay"></div>
                <iframe class="main-video" src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&enablejsapi=1&rel=0" allow="autoplay; encrypted-media;"></iframe>
                <div class="comment-canvas"></div>
            </div>
        `;

        let isResizing = false;
        let currentHandle = '';

        // --- リサイズ判定の修正 ---
        win.onmousemove = (e) => {
            // 設定パネルの上では何もしない
            if (e.target.closest('.individual-config')) {
                win.style.cursor = 'default';
                return;
            }
        
            if (win.classList.contains('interacting') || isResizing) return;
            
            const rect = win.getBoundingClientRect();
            const hit = 25; // 判定範囲を25pxに変更
            let cursor = '';
            
            // 上下左右の端から25px以内か判定
            const isTop = (e.clientY - rect.top < hit);
            const isBottom = (rect.bottom - e.clientY < hit);
            const isLeft = (e.clientX - rect.left < hit);
            const isRight = (rect.right - e.clientX < hit);
        
            if (isTop) cursor += 'n';
            else if (isBottom) cursor += 's';
            
            if (isLeft) cursor += 'w';
            else if (isRight) cursor += 'e';
            
            // リサイズ領域にいる場合のみカーソルを変更
            if (cursor) {
                win.style.cursor = cursor + '-resize';
                currentHandle = cursor;
            } else {
                win.style.cursor = 'default';
                currentHandle = '';
            }
        };

        win.onmousedown = (e) => {
            if (win.style.cursor.includes('resize')) {
                isResizing = true;
                guard.style.display = 'block';
                guard.style.cursor = win.style.cursor;
                win.classList.add('moving');

                const startW = win.offsetWidth;
                const startH = win.offsetHeight;
                const startX = e.clientX;
                const startY = e.clientY;
                const startL = win.offsetLeft;
                const startT = win.offsetTop;

                const onMove = (ev) => {
                    if (currentHandle.includes('e')) win.style.width = Math.max(200, startW + (ev.clientX - startX)) + 'px';
                    if (currentHandle.includes('s')) win.style.height = Math.max(120, startH + (ev.clientY - startY)) + 'px';
                    if (currentHandle.includes('w')) {
                        const newW = Math.max(200, startW - (ev.clientX - startX));
                        win.style.left = (startL + startW - newW) + 'px';
                        win.style.width = newW + 'px';
                    }
                    if (currentHandle.includes('n')) {
                        const newH = Math.max(120, startH - (ev.clientY - startY));
                        win.style.top = (startT + startH - newH) + 'px';
                        win.style.height = newH + 'px';
                    }
                };
                const onUp = () => {
                    isResizing = false;
                    guard.style.display = 'none';
                    win.classList.remove('moving');
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
                e.preventDefault();
            }
        };

        // ドラッグ & スナップ（判定 100px）
        const overlay = win.querySelector('.drag-overlay');
        const configPanel = win.querySelector('.individual-config');
        overlay.onmousedown = (e) => {
            // リサイズ領域（25px以内）や設定パネル上では移動を開始しない
            if (win.style.cursor.includes('resize') || e.target.closest('.individual-config')) {
                return;
            }
            
            if (isResizing) return;
            
            win.classList.add('moving');
            win.style.zIndex = windowZIndex++;
            guard.style.display = 'block';
            guard.style.cursor = 'move';

            let shiftX = e.clientX - win.getBoundingClientRect().left;
            let shiftY = e.clientY - win.getBoundingClientRect().top;

            const preview = document.getElementById('snap-preview');
            const onMove = (ev) => {
                win.style.left = ev.pageX - shiftX + 'px';
                win.style.top = ev.pageY - shiftY + 'px';
            
                // スナップ予測の表示
                const snapRange = 100;
                const sw = window.innerWidth;
                const sh = window.innerHeight;
                const x = ev.clientX;
                const y = ev.clientY;
            
                let preRect = null;
                if (x < snapRange && y < snapRange) preRect = {l:0, t:0, w:sw/2, h:sh/2};
                else if (x > sw - snapRange && y < snapRange) preRect = {l:sw/2, t:0, w:sw/2, h:sh/2};
                else if (x < snapRange && y > sh - snapRange) preRect = {l:0, t:sh/2, w:sw/2, h:sh/2};
                else if (x > sw - snapRange && y > sh - snapRange) preRect = {l:sw/2, t:sh/2, w:sw/2, h:sh/2};
                else if (x < snapRange) preRect = {l:0, t:0, w:sw/2, h:sh};
                else if (x > sw - snapRange) preRect = {l:sw/2, t:0, w:sw/2, h:sh};
                else if (y < snapRange) preRect = {l:0, t:0, w:sw, h:sh/2};
                else if (y > sh - snapRange) preRect = {l:0, t:sh/2, w:sw, h:sh/2};
            
                if (preRect) {
                    preview.style.display = 'block';
                    preview.style.left = preRect.l + 'px';
                    preview.style.top = preRect.t + 'px';
                    preview.style.width = preRect.w + 'px';
                    preview.style.height = preRect.h + 'px';
                } else {
                    preview.style.display = 'none';
                }
            };

            const onUp = (ev) => {
                preview.style.display = 'none';
                win.classList.remove('moving');
                guard.style.display = 'none';
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);

                const snapRange = 100; // スナップ判定範囲を拡大
                const sw = window.innerWidth;
                const sh = window.innerHeight;
                const x = ev.clientX;
                const y = ev.clientY;

                if (x < snapRange && y < snapRange) snap(0, 0, sw/2, sh/2); // 左上
                else if (x > sw - snapRange && y < snapRange) snap(sw/2, 0, sw/2, sh/2); // 右上
                else if (x < snapRange && y > sh - snapRange) snap(0, sh/2, sw/2, sh/2); // 左下
                else if (x > sw - snapRange && y > sh - snapRange) snap(sw/2, sh/2, sw/2, sh/2); // 右下
                else if (x < snapRange) snap(0, 0, sw/2, sh); // 左
                else if (x > sw - snapRange) snap(sw/2, 0, sw/2, sh); // 右
                else if (y < snapRange) snap(0, 0, sw, sh/2); // 上
                else if (y > sh - snapRange) snap(0, sh/2, sw, sh/2); // 下
            };

            function snap(l, t, w, h) {
                win.style.left = l + 'px'; win.style.top = t + 'px';
                win.style.width = w + 'px'; win.style.height = h + 'px';
            }

            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        };

        // --- 右クリック：元通り禁止（最前面へ移動させるだけ） ---
        overlay.oncontextmenu = (e) => {
            e.preventDefault(); 
            win.style.zIndex = windowZIndex++;
        };
        
        // --- ダブルクリック：操作モード（YouTubeメニューへのアクセス）を開放 ---
        overlay.ondblclick = () => {
            win.classList.add('interacting');
            // ヒント：操作モードになったことがわかるようにボーダーの色を変えるのもアリです
        };
        
        // ウィンドウの外をクリックしたら「操作モード」を解除して「移動モード」に戻す
        window.addEventListener('mousedown', (e) => {
            if (!win.contains(e.target)) {
                win.classList.remove('interacting');
            }
        });

        // ウィンドウ全体での右クリック禁止を再有効化
        win.oncontextmenu = (e) => {
            e.preventDefault(); 
            win.style.zIndex = windowZIndex++;
        };
        
        const iframe = win.querySelector('iframe');
        iframe.onload = () => {
            // 読み込み完了後、少し待ってから最高画質コマンドを送信
            setTimeout(() => {
                // 初回実行時はactive状態（HQ）なので、コマンドだけ送信
                if (win.querySelector('.quality-btn').classList.contains('active')) {
                    sendCommand(id, 'setPlaybackQuality', ['highres']);
                }
            }, 2000); 
        };
        document.getElementById('canvas').appendChild(win); // これは既存の行
    }

    // 個別に動画を追加する関数（カードクリック時に呼ばれる）
    function addStream(id) {
        if (document.querySelector(`[data-video-id="${id}"]`)) return;
        
        // サイドバーの「empty」状態を解除
        const sidebar = document.getElementById('sidebar');
        if (sidebar) sidebar.classList.remove('empty');
    
        // 既存の作成関数を流用（indexは現在のウィンドウ数にする）
        const currentIndex = document.querySelectorAll('.video-window').length;
        createVideoWindow(id, currentIndex);
        updateStreamList();
    
        // 拡張機能へポーリング開始を通知
        window.postMessage({ 
            type: "START_POLLING_REQUEST", 
            videoIds: [id] 
        }, "*");
    }
    
    // Holodex APIから配信中データを取得して表示
    async function updateHoloLiveStatus() {
        const listContainer = document.getElementById('hololive-live-list');
        const API_KEY = '65f92c6d-c919-4861-a3a6-735a7290ec4a'; 
        const url = 'https://holodex.net/api/v2/live?org=Hololive&status=live&type=stream';
    
        try {
            const response = await fetch(url, {
                method: 'GET',
                headers: { 'X-APIKEY': API_KEY, 'Content-Type': 'application/json' }
            });
    
            const rawData = await response.json();
            listContainer.innerHTML = '';
    
            // フィルタリング（Hololiveのみ、かつホロスターズ除外）
            const data = rawData.filter(v => {
                if (!v.channel || v.channel.org !== "Hololive") return false;
                const suborg = v.channel.suborg ? v.channel.suborg.toUpperCase() : "";
                return !suborg.includes("HOLOSTARS");
            });
    
            if (data.length === 0) {
                listContainer.innerHTML = '<p style="font-size: 10px; color: #666; text-align: center; padding: 10px;">現在配信中の公式メンバーはいません</p>';
                return;
            }
    
            // 重複排除
            const uniqueData = Array.from(new Map(data.map(item => [item.channel.id, item])).values());
    
            uniqueData.forEach(video => {
                const card = document.createElement('div');
                card.className = 'live-card';
                
                const channelName = video.channel.name.replace(/Ch\.|- /gi, '').trim();
                // サムネイルURL（YouTubeの標準形式）
                const thumbUrl = `https://img.youtube.com/vi/${video.id}/mqdefault.jpg`;
    
                card.innerHTML = `
                    <img src="${thumbUrl}" class="live-thumb" alt="thumbnail">
                    <div class="live-card-info">
                        <div class="live-card-channel">${channelName}</div>
                        <div class="live-card-title">${video.title}</div>
                    </div>
                `;
                
                // クリックイベント
                card.onclick = () => addStream(video.id);
                
                listContainer.appendChild(card);
            });
    
        } catch (error) {
            console.error('API Error:', error);
            listContainer.innerHTML = '<p style="color:red; font-size:10px;">API取得エラー</p>';
        }
    }
    
    // ページ読み込み時に実行
    updateHoloLiveStatus();
    // 2分ごとにリストを自動更新
    setInterval(updateHoloLiveStatus, 120000);

    function updateStreamList() {
        const list = document.getElementById('stream-list');
        list.innerHTML = '';
        const windows = document.querySelectorAll('.video-window');
        
        windows.forEach(win => {
            const id = win.dataset.videoId;
            // チャンネル名やタイトルを取得できればベストですが、簡易的にIDで表示
            const item = document.createElement('div');
            item.className = 'stream-item';
            item.style.padding = '10px'; // 少し大きく
            item.innerHTML = `
                <span style="color:var(--accent)">ID: ${id.substring(0,8)}</span>
                <button onclick="removeStream('${id}')" style="padding: 2px 8px; cursor:pointer;">削除</button>
            `;
            list.appendChild(item);
        });
    
        // 配信がゼロになったらemptyに戻す
        const sidebar = document.getElementById('sidebar');
        if (windows.length === 0) {
            sidebar.classList.add('empty');
        } else {
            sidebar.classList.remove('empty');
        }
    }
    
    function removeStream(id) {
        const target = document.querySelector(`[data-video-id="${id}"]`);
        if (target) {
            target.remove();
            updateStreamList(); // リストを再描画
        }
    }

    function removeStream(id) {
        const target = document.querySelector(`[data-video-id="${id}"]`);
        if (target) target.remove();
        
        // sidebarをその場で取得するように変更
        const sidebar = document.getElementById('sidebar');
        if (sidebar && document.querySelectorAll('.video-window').length === 0) {
            sidebar.classList.add('empty');
        }
        updateStreamList();
    }

    // リサイズ追従用の変数
    let lastWindowWidth = window.innerWidth;
    let lastWindowHeight = window.innerHeight;
    
    window.addEventListener('resize', () => {
        const newWidth = window.innerWidth;
        const newHeight = window.innerHeight;
    
        // 倍率を計算
        const scaleX = newWidth / lastWindowWidth;
        const scaleY = newHeight / lastWindowHeight;
    
        // 全ての動画ウィンドウを走査して位置とサイズを更新
        document.querySelectorAll('.video-window').forEach(win => {
            const rect = win.getBoundingClientRect();
    
            // 新しい位置とサイズを計算
            const nextLeft = rect.left * scaleX;
            const nextTop = rect.top * scaleY;
            const nextWidth = rect.width * scaleX;
            const nextHeight = rect.height * scaleY;
    
            // 最小サイズ（200x120）を下回らないように適用
            win.style.left = nextLeft + 'px';
            win.style.top = nextTop + 'px';
            win.style.width = Math.max(200, nextWidth) + 'px';
            win.style.height = Math.max(120, nextHeight) + 'px';
        });
    
        // 現在のサイズを保存
        lastWindowWidth = newWidth;
        lastWindowHeight = newHeight;
    });

    // コメント受信：innerHTMLを使用して絵文字を復活
    window.addEventListener("message", (event) => {
        try {
                const msg = JSON.parse(event.data);
                if (msg.event === 'infoDelivery' && msg.info && msg.info.playerState !== undefined) {
                    // 動画IDを特定（iframeのsrcなどから）
                    const frames = document.querySelectorAll('iframe.main-video');
                    frames.forEach(frame => {
                        if (frame.contentWindow === event.source) {
                            const win = frame.closest('.video-window');
                            const btn = win.querySelector('.play-pause-btn');
                            // 1 = 再生中, 2 = 一時停止中
                            btn.innerText = (msg.info.playerState === 1) ? 'Ⅱ' : '▶';
                        }
                    });
                }
            } catch(e) {}
        if (event.data && event.data.type === "FROM_EXTENSION") {
            const data = event.data.data;
            const win = document.querySelector(`[data-video-id="${data.videoId}"]`);
            if (win && win.querySelector('.cfg-show').checked) {
                const canvas = win.querySelector('.comment-canvas');
                const el = document.createElement('div');
                el.className = 'comment-text';
                
                // --- 判定ロジックの強化 ---
                // 拡張機能によってプロパティ名が異なるため、代表的なものを網羅
                const isMember = data.isMember || 
                                 data.type === 'member' ||  // ← これを追加
                                 data.authorType === 'member' || 
                                 data.authorType === 'MEMBER' || // 大文字もカバー
                                 data.membership === true || 
                                 (data.badge && data.badge.includes('member'));

                const isSupa = data.isSupa || 
                               data.purchaseAmount || 
                               data.type === 'superchat' ||
                               data.type === 'super-chat';
        
                if (isMember) {
                    el.classList.add('is-member');
                }
                if (isSupa) {
                    el.classList.add('is-supa');
                }
        
                el.innerHTML = data.text;
                
                // フォントサイズと速度の取得
                const size = win.querySelector('.cfg-size').value;
                const speedValue = win.querySelector('.cfg-speed').value;
                const duration = (22 - speedValue) * 800;

                el.style.fontSize = size + 'px';
                // 高さを「行」で管理して重なりを軽減（0-14行のどこか）
                el.style.top = (Math.floor(Math.random() * 15) * 6) + '%';
                el.style.left = '100%';
                
                canvas.appendChild(el);

                const startTime = performance.now();
                function animate(time) {
                    const progress = (time - startTime) / duration;
                    // 流れる距離を計算
                    const distance = win.offsetWidth + el.offsetWidth + 200;
                    el.style.transform = `translateX(-${distance * progress}px)`;
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        el.remove();
                    }
                }
                requestAnimationFrame(animate);
            }
        }
    });
</script>
</body>
</html>
