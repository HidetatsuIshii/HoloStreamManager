<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HoloStreamer Pro - Borderless Canvas</title>
    <style>
        :root {
            --bg-dark: #050505;
            --panel-bg: rgba(20, 20, 20, 0.98);
            --accent: #00d4ff;
            --text: #e0e0e0;
            --member-green: #2ba640;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: var(--bg-dark); color: var(--text);
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* サイドバー */
        #sidebar {
            position: fixed; top: 0; left: 0; width: 280px; height: 100%;
            background: var(--panel-bg); border-right: 1px solid #444;
            z-index: 9999; transition: transform 0.3s ease;
            transform: translateX(-270px);
        }
        #sidebar.active, #sidebar.empty { transform: translateX(0); }
        .sidebar-content { padding: 20px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
        
        textarea {
            width: 100%; height: 100px; background: #111; color: #0f0;
            border: 1px solid #333; border-radius: 4px; padding: 10px;
            box-sizing: border-box; font-family: monospace; font-size: 11px;
        }

        /* 配信管理リスト */
        #stream-manager { margin-top: 20px; flex: 1; overflow-y: auto; }
        .stream-item {
            background: #222; margin-bottom: 5px; padding: 8px;
            border-radius: 4px; display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; border-left: 3px solid #555;
        }
        .stream-item.pinned { border-left-color: var(--accent); background: #2a2a2a; }

        /* ビデオウィンドウ（ヘッダーなし） */
        .video-window {
            position: absolute; width: 480px; height: 270px;
            background: #000; border: 2px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            display: flex; flex-direction: column;
            resize: both; overflow: hidden;
            min-width: 160px; min-height: 90px;
        }

        .video-content { flex: 1; position: relative; width: 100%; height: 100%; }
        iframe.main-video { width: 100%; height: 100%; border: none; }
        
        /* ドラッグ用透明カバー（ダブルクリックで操作切り替え） */
        .drag-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; cursor: move;
        }
        .video-window.interacting .drag-overlay { pointer-events: none; opacity: 0; }

        /* 個別設定パネル（左上配置・小型化） */
        .individual-config {
            position: absolute; top: 5px; left: 5px;
            background: rgba(0,0,0,0.8); padding: 6px; border-radius: 4px;
            display: none; z-index: 200; font-size: 9px; width: 100px;
            border: 1px solid #444; transform: scale(0.9); transform-origin: top left;
        }
        .video-window:hover .individual-config { display: block; }

        .comment-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; overflow: hidden; }
        .comment-text { position: absolute; white-space: nowrap; font-weight: 900; color: white; text-shadow: 2px 2px 2px #000; will-change: transform; }
        .sc-amount { color: #000; padding: 1px 4px; border-radius: 3px; margin-right: 6px; font-size: 0.8em; font-weight: bold; }

        button { cursor: pointer; border: none; font-weight: bold; border-radius: 3px; }
        .apply-btn { width: 100%; padding: 10px; background: var(--accent); color: #000; margin-top: 10px; }
        .item-btn { padding: 2px 6px; font-size: 10px; background: #444; color: #fff; margin-left: 4px; }
    </style>
</head>
<body>

<div id="sidebar" class="empty">
    <div class="sidebar-content">
        <h2 style="color: var(--accent); margin-bottom: 5px; font-size: 18px;">HoloStreamer Pro</h2>
        <textarea id="url-list" placeholder="URLを入力して展開..."></textarea>
        <button class="apply-btn" onclick="applyStreams()">キャンバスに展開</button>
        
        <div id="stream-manager">
            <p style="font-size: 10px; color: #666; border-bottom: 1px solid #333; padding-bottom: 5px;">ACTIVE STREAMS</p>
            <div id="stream-list"></div>
        </div>

        <div style="font-size:9px; color:#555; margin-top: 10px;">
            ※動画内操作：枠外をクリックで移動モード解除<br>
            ※右クリック：最背面へ
        </div>
    </div>
</div>

<div id="canvas"></div>

<script>
    let commentQueue = [];
    let isProcessingQueue = false;
    let windowZIndex = 100;

    const sidebar = document.getElementById('sidebar');
    window.addEventListener('mousemove', (e) => {
        if (e.clientX < 20) sidebar.classList.add('active');
        else if (e.clientX > 300) sidebar.classList.remove('active');
    });

    window.addEventListener("message", (event) => {
        if (event.data && event.data.type === "FROM_EXTENSION") {
            commentQueue.push(event.data.data);
            if (!isProcessingQueue) processQueue();
        }
    });

    async function processQueue() {
        if (commentQueue.length === 0) { isProcessingQueue = false; return; }
        isProcessingQueue = true;
        const data = commentQueue.shift();
        const win = Array.from(document.querySelectorAll('.video-window')).find(w => w.dataset.videoId === data.videoId);
        if (win) createComment(win, data);
        setTimeout(processQueue, 10);
    }

    function createComment(win, data) {
        if (!win.querySelector('.cfg-show').checked) return;

        const size = win.querySelector('.cfg-size').value;
        const speedVal = win.querySelector('.cfg-speed').value;
        // 速度ロジック調整: 右にいくほど速く(durationが短く)なる。15秒〜2秒の間で可変
        const duration = (17 - speedVal) * 1000;

        const el = document.createElement('div');
        el.className = `comment-text`;
        if (data.type === 'super-chat') {
            el.innerHTML = `<span class="sc-amount" style="background-color: ${data.color}">${data.amount}</span>${data.text}`;
            el.style.color = data.color;
        } else {
            el.innerHTML = data.text;
            if (data.type === 'member') el.style.color = 'var(--member-green)';
        }
        
        el.style.fontSize = size + 'px';
        const canvas = win.querySelector('.comment-canvas');
        el.style.top = Math.random() * win.querySelector('.cfg-range').value + '%';
        el.style.left = '100%';
        canvas.appendChild(el);

        const startTime = performance.now();
        function animate(time) {
            const progress = (time - startTime) / duration;
            el.style.transform = `translateX(-${(win.offsetWidth + 800) * progress}px)`;
            if (progress < 1) requestAnimationFrame(animate); else el.remove();
        }
        requestAnimationFrame(animate);
    }

    function applyStreams() {
        const ids = document.getElementById('url-list').value.split(/\s+/).map(url => {
            const m = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
            return m ? m[1] : null;
        }).filter(id => id);

        if (ids.length > 0) sidebar.classList.remove('empty');
        ids.forEach((id, index) => {
            if (document.querySelector(`[data-video-id="${id}"]`)) return;
            createVideoWindow(id, index);
        });
        window.postMessage({ type: "START_POLLING_REQUEST", videoIds: ids }, "*");
        updateStreamList();
    }

    function createVideoWindow(id, index) {
        const win = document.createElement('div');
        win.className = 'video-window';
        win.dataset.videoId = id;
        win.style.left = (50 + (index % 4) * 60) + 'px';
        win.style.top = (50 + Math.floor(index / 4) * 60) + 'px';
        win.style.zIndex = windowZIndex++;

        win.innerHTML = `
            <div class="individual-config">
                <label><input type="checkbox" class="cfg-show" checked> 表示</label><br>
                サイズ <input type="range" class="cfg-size" min="10" max="50" value="20" style="width:100%"><br>
                速度 <input type="range" class="cfg-speed" min="2" max="15" value="2" style="width:100%"><br>
                範囲 <input type="range" class="cfg-range" min="10" max="95" value="80" style="width:100%">
            </div>
            <div class="video-content">
                <div class="drag-overlay"></div>
                <iframe class="main-video" src="https://www.youtube.com/embed/${id}?autoplay=1"></iframe>
                <iframe src="https://www.youtube.com/live_chat?v=${id}" style="display:none"></iframe>
                <div class="comment-canvas"></div>
            </div>
        `;

        const overlay = win.querySelector('.drag-overlay');

        // ドラッグ移動の実装（オーバーレイ上での操作）
        overlay.onmousedown = (e) => {
            if (win.dataset.pinned !== "true") win.style.zIndex = windowZIndex++;
            let shiftX = e.clientX - win.getBoundingClientRect().left;
            let shiftY = e.clientY - win.getBoundingClientRect().top;

            function moveAt(pageX, pageY) {
                win.style.left = pageX - shiftX + 'px';
                win.style.top = pageY - shiftY + 'px';
            }

            function onMouseMove(ev) { moveAt(ev.pageX, ev.pageY); }
            document.addEventListener('mousemove', onMouseMove);
            document.onmouseup = () => {
                document.removeEventListener('mousemove', onMouseMove);
                document.onmouseup = null;
            };
        };

        // ダブルクリックで動画を直接操作モードに
        overlay.ondblclick = () => {
            win.classList.add('interacting');
            win.style.borderColor = var(--accent);
        };

        // 枠外をクリックしたら操作モード終了、移動モードへ
        window.addEventListener('mousedown', (e) => {
            if (!win.contains(e.target)) {
                win.classList.remove('interacting');
                win.style.borderColor = "#333";
            }
        });

        win.oncontextmenu = (e) => {
            if (win.dataset.pinned === "true") return;
            e.preventDefault();
            win.style.zIndex = 1;
        };

        document.getElementById('canvas').appendChild(win);
    }

    function updateStreamList() {
        const list = document.getElementById('stream-list');
        list.innerHTML = '';
        const windows = document.querySelectorAll('.video-window');
        windows.forEach(win => {
            const id = win.dataset.videoId;
            const item = document.createElement('div');
            item.className = 'stream-item' + (win.dataset.pinned === "true" ? ' pinned' : '');
            item.innerHTML = `
                <span>ID: ${id}</span>
                <div>
                    <button class="item-btn" onclick="togglePin('${id}')">📌</button>
                    <button class="item-btn" onclick="removeStream('${id}')" style="background:#600">✕</button>
                </div>
            `;
            list.appendChild(item);
        });
    }

    function togglePin(id) {
        const win = document.querySelector(`[data-video-id="${id}"]`);
        const isPinned = win.dataset.pinned === "true";
        win.dataset.pinned = !isPinned;
        win.style.zIndex = isPinned ? windowZIndex++ : 9000;
        win.style.borderColor = isPinned ? "#333" : "var(--accent)";
        updateStreamList();
    }

    function removeStream(id) {
        document.querySelector(`[data-video-id="${id}"]`).remove();
        if (document.querySelectorAll('.video-window').length === 0) sidebar.classList.add('empty');
        updateStreamList();
    }
</script>
</body>
</html>
