<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HoloStreamer Pro - Canvas Edition</title>
    <style>
        :root {
            --bg-dark: #050505;
            --panel-bg: rgba(25, 25, 25, 0.98);
            --accent: #00d4ff;
            --text: #e0e0e0;
            --member-green: #2ba640;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: var(--bg-dark); color: var(--text);
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 1. サイドバー制御 */
        #sidebar {
            position: fixed; top: 0; left: 0; width: 280px; height: 100%;
            background: var(--panel-bg); border-right: 1px solid #444;
            z-index: 9999; transition: transform 0.3s ease;
            transform: translateX(-270px);
        }
        /* 動画がない(empty)とき、またはマウスホバー時に表示 */
        #sidebar.active, #sidebar.empty { transform: translateX(0); }

        .sidebar-content { padding: 20px; }
        textarea {
            width: 100%; height: 150px; background: #111; color: #0f0;
            border: 1px solid #333; border-radius: 4px; padding: 10px;
            box-sizing: border-box; font-family: monospace; font-size: 12px;
        }

        #canvas { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

        /* 2. ビデオウィンドウ（キャンバス配置） */
        .video-window {
            position: absolute; width: 480px; height: 310px;
            background: #000; border: 2px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            display: flex; flex-direction: column;
            resize: both; overflow: hidden; /* リサイズ有効 */
            min-width: 250px; min-height: 180px;
        }

        /* ウィンドウヘッダー */
        .window-header {
            height: 28px; background: #222; cursor: move;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px; font-size: 11px; color: #aaa; user-select: none;
        }
        .header-left { display: flex; align-items: center; gap: 8px; }

        .video-content { flex: 1; position: relative; }
        iframe.main-video { width: 100%; height: 100%; border: none; }
        
        /* コメント表示層 */
        .comment-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100; overflow: hidden;
        }

        /* 3. 個別設定パネル（ホバー時のみ表示） */
        .individual-config {
            position: absolute; top: 35px; right: 10px;
            background: rgba(0,0,0,0.85); padding: 8px; border-radius: 6px;
            display: none; z-index: 200; font-size: 10px; width: 130px;
            border: 1px solid #444; color: #fff;
        }
        .video-window:hover .individual-config { display: block; }

        .comment-text {
            position: absolute; white-space: nowrap; font-weight: 900;
            color: white; text-shadow: 2px 2px 2px #000;
            will-change: transform;
        }

        .sc-amount {
            color: #000; padding: 1px 4px; border-radius: 3px;
            margin-right: 6px; font-size: 0.8em; font-weight: bold;
        }

        button.apply-btn {
            width: 100%; padding: 12px; background: var(--accent); border: none;
            font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px;
        }
        .pin-btn { cursor: pointer; font-size: 14px; }
        .close-btn { cursor: pointer; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar" class="empty">
    <div class="sidebar-content">
        <h2 style="color: var(--accent); margin-bottom: 5px;">HoloStreamer Pro</h2>
        <p style="font-size:11px; color:#888;">YouTube URLを1行ずつ入力</p>
        <textarea id="url-list" placeholder="https://www.youtube.com/watch?v=..."></textarea>
        <button class="apply-btn" onclick="applyStreams()">キャンバスに展開</button>
        <div style="margin-top:20px; border-top: 1px solid #333; pt-10px;">
            <p style="font-size:10px; line-height:1.6; color:#777;">
                ・ヘッダーをドラッグで移動<br>
                ・右下角をドラッグでリサイズ<br>
                ・📌で前面に固定<br>
                ・右クリックで最背面へ移動
            </p>
        </div>
    </div>
</div>

<div id="canvas"></div>

<script>
    let commentQueue = [];
    let isProcessingQueue = false;
    let windowZIndex = 100;

    // サイドバーの表示制御
    const sidebar = document.getElementById('sidebar');
    window.addEventListener('mousemove', (e) => {
        if (e.clientX < 20) sidebar.classList.add('active');
        else if (e.clientX > 300) sidebar.classList.remove('active');
    });

    // 拡張機能からのコメント受信
    window.addEventListener("message", (event) => {
        if (event.data && event.data.type === "FROM_EXTENSION") {
            commentQueue.push(event.data.data);
            if (!isProcessingQueue) processQueue();
        }
    });

    async function processQueue() {
        if (commentQueue.length === 0) { isProcessingQueue = false; return; }
        isProcessingQueue = true;
        const data = commentQueue.shift();
        const win = Array.from(document.querySelectorAll('.video-window')).find(w => w.dataset.videoId === data.videoId);
        if (win) createComment(win, data);
        setTimeout(processQueue, 10);
    }

    function createComment(win, data) {
        // 個別設定のチェック
        const showComments = win.querySelector('.cfg-show').checked;
        if (!showComments) return;

        const size = win.querySelector('.cfg-size').value;
        const speed = win.querySelector('.cfg-speed').value;
        const range = win.querySelector('.cfg-range').value;

        const el = document.createElement('div');
        el.className = `comment-text`;
        
        let html = "";
        if (data.type === 'super-chat') {
            html += `<span class="sc-amount" style="background-color: ${data.color}">${data.amount}</span>`;
            el.style.color = data.color;
        } else if (data.type === 'member') {
            el.style.color = 'var(--member-green)';
        }
        html += data.text;
        el.innerHTML = html;
        el.style.fontSize = size + 'px';

        const canvas = win.querySelector('.comment-canvas');
        el.style.top = Math.random() * range + '%';
        el.style.left = '100%';
        canvas.appendChild(el);

        const duration = (parseFloat(speed) * 1000);
        const startTime = performance.now();

        function animate(time) {
            const progress = (time - startTime) / duration;
            // ウィンドウ幅に合わせて移動
            el.style.transform = `translateX(-${(win.offsetWidth + 800) * progress}px)`;
            if (progress < 1) requestAnimationFrame(animate); else el.remove();
        }
        requestAnimationFrame(animate);
    }

    function getYouTubeId(url) {
        const m = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
        return m ? m[1] : null;
    }

    function applyStreams() {
        const input = document.getElementById('url-list').value;
        const ids = input.split(/\s+/).map(getYouTubeId).filter(id => id);

        if (ids.length > 0) sidebar.classList.remove('empty');
        else sidebar.classList.add('empty');

        ids.forEach((id, index) => {
            // すでに存在する場合はスキップ
            if (document.querySelector(`[data-video-id="${id}"]`)) return;
            createVideoWindow(id, index);
        });

        window.postMessage({ type: "START_POLLING_REQUEST", videoIds: ids }, "*");
    }

    function createVideoWindow(id, index) {
        const win = document.createElement('div');
        win.className = 'video-window';
        win.dataset.videoId = id;
        win.style.left = (50 + (index % 5) * 40) + 'px';
        win.style.top = (50 + Math.floor(index / 5) * 40) + 'px';
        win.style.zIndex = windowZIndex++;

        win.innerHTML = `
            <div class="window-header">
                <div class="header-left">
                    <span class="pin-btn" title="前面固定">📌</span>
                    <span>ID: ${id}</span>
                </div>
                <span class="close-btn">✕</span>
            </div>
            <div class="individual-config">
                <label style="display:flex;align-items:center;gap:5px;">
                    <input type="checkbox" class="cfg-show" checked> 表示
                </label>
                サイズ <input type="range" class="cfg-size" min="12" max="60" value="28" style="width:100%">
                速度 <input type="range" class="cfg-speed" min="2" max="15" value="6" style="width:100%">
                範囲 <input type="range" class="cfg-range" min="10" max="95" value="80" style="width:100%">
            </div>
            <div class="video-content">
                <iframe class="main-video" src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1"></iframe>
                <iframe src="https://www.youtube.com/live_chat?v=${id}" style="display:none"></iframe>
                <div class="comment-canvas"></div>
            </div>
        `;

        const header = win.querySelector('.window-header');
        const pinBtn = win.querySelector('.pin-btn');
        let isPinned = false;

        // 前面固定
        pinBtn.onclick = (e) => {
            e.stopPropagation();
            isPinned = !isPinned;
            if (isPinned) {
                win.style.zIndex = 9000;
                pinBtn.style.color = "var(--accent)";
                win.style.borderColor = "var(--accent)";
            } else {
                win.style.zIndex = windowZIndex++;
                pinBtn.style.color = "inherit";
                win.style.borderColor = "#333";
            }
        };

        // 右クリックで最背面へ
        win.oncontextmenu = (e) => {
            if (isPinned) return;
            e.preventDefault();
            win.style.zIndex = 1;
        };

        // 閉じるボタン
        win.querySelector('.close-btn').onclick = () => {
            win.remove();
            if (document.querySelectorAll('.video-window').length === 0) sidebar.classList.add('empty');
        };

        // ドラッグ移動 (ヘッダーのみ)
        header.onmousedown = (e) => {
            if (!isPinned) win.style.zIndex = windowZIndex++;
            
            let shiftX = e.clientX - win.getBoundingClientRect().left;
            let shiftY = e.clientY - win.getBoundingClientRect().top;

            function moveAt(pageX, pageY) {
                win.style.left = pageX - shiftX + 'px';
                win.style.top = pageY - shiftY + 'px';
            }

            function onMouseMove(e) { moveAt(e.pageX, e.pageY); }
            document.addEventListener('mousemove', onMouseMove);
            document.onmouseup = () => {
                document.removeEventListener('mousemove', onMouseMove);
                document.onmouseup = null;
            };
        };
        
        document.getElementById('canvas').appendChild(win);
    }
</script>
</body>
</html>
