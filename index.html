<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>監視ビューア</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
            background-color: #f3f3f3;
        }

        /* 全体コンテナ */
        #app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* サイドメニュー：初期状態 */
        #side-menu {
            width: 250px;
            height: 100%;
            background-color: #232f3e;
            color: white;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
            left: 0;
            top: 0;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }

        /* メニューが隠れた状態 */
        #side-menu.hidden {
            transform: translateX(-100%);
        }

        /* メイン配信エリア：メニューの有無に合わせて自動で広がる */
        #view-area {
            flex-grow: 1;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: padding-left 0.5s ease;
            width: 100%;
        }

        /* 配信アイテム（ログイン画面など）のコンテナ */
        .stream-item {
            width: 100%;
            height: 100%;
            max-width: 100%; /* 1つの時に画面いっぱいに広がる */
            max-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* 内部のAmazonログインボックス等のサイズを最大化 */
        .auth-container {
            width: 100%;
            max-width: 450px; /* 1つの時でも見栄えが良い適切な最大幅 */
            padding: 40px;
            transform: scale(1.1); /* 迫力を出すためのスケーリング */
        }
    </style>
</head>
<body onmousemove="handleUserActivity()">

    <div id="app-container">
        <div id="side-menu">
            <h2>管理パネル</h2>
            <p>ステータス: 監視中</p>
            <hr>
            <ul>
                <li>デバイス一覧</li>
                <li>ログ確認</li>
                <li>設定</li>
            </ul>
            <p style="font-size: 0.8em; margin-top: 50px; color: #888;">
                ※マウスを動かすと再表示されます
            </p>
        </div>

        <div id="view-area">
            <div class="stream-item">
                <div class="auth-container">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" width="120" style="display:block; margin: 0 auto 20px;">
                    <div style="border: 1px solid #ddd; border-radius: 8px; padding: 30px;">
                        <h1 style="font-size: 24px; font-weight: 400; margin-bottom: 20px;">サインインまたはアカウントを作成</h1>
                        <div style="width: 100%; height: 40px; background: #f0c14b; border-radius: 8px; text-align: center; line-height: 40px; cursor: pointer; font-weight: bold;">
                            次に進む
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let hideTimeout;
        const sideMenu = document.getElementById('side-menu');

        function handleUserActivity() {
            // マウスが動いたらメニューを表示
            showMenu();

            // 既存のタイマーをリセット
            clearTimeout(hideTimeout);

            // 3秒間操作がなければ隠す
            hideTimeout = setTimeout(() => {
                hideMenu();
            }, 3000);
        }

        function showMenu() {
            sideMenu.classList.remove('hidden');
        }

        function hideMenu() {
            sideMenu.classList.add('hidden');
        }

        // 初期起動時も数秒後に隠す設定
        handleUserActivity();
    </script>
</body>
</html>
